// ── Helpers ───────────────────────────────────────────────────────
function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
}
function nowStr() { return new Date().toISOString(); }

// ── Onboard Modal ─────────────────────────────────────────────────
function OnboardModal({ token, onClose, onSuccess }) {
  const [step, setStep]         = useState(1);
  const [orgName, setOrgName]   = useState("");
  const [industry, setIndustry] = useState("Oil & Gas");
  const [country, setCountry]   = useState("UAE");
  const [adminName, setAdminName] = useState("");
  const [adminEmail, setAdminEmail] = useState("");
  const [tempPass, setTempPass] = useState("Controlit@2024!");
  const [busy, setBusy]         = useState(false);
  const [err, setErr]           = useState("");
  const [result, setResult]     = useState(null);

  async function onboard() {
    if (!orgName||!adminName||!adminEmail||!tempPass) { setErr("All fields are required."); return; }
    setBusy(true); setErr("");
    try {
      // 1. Create organisation
      const orgs = await sb.insert(token, "organisations", {
        name: orgName, slug: slugify(orgName), industry, country, active: true,
      });
      if (!orgs || !orgs[0]) { setErr("Failed to create organisation."); setBusy(false); return; }
      const org = orgs[0];

      // 2. Create auth user automatically — no Supabase dashboard needed
      const authUser = await sb.inviteUser(adminEmail, tempPass);
      if (!authUser || authUser.error || !authUser.id) {
        setErr("Failed to create auth user: " + (authUser?.error?.message || authUser?.msg || "Unknown error"));
        setBusy(false); return;
      }
      const userId = authUser.id;

      // 3. Create admin profile automatically
      await sb.insert(token, "profiles", {
        id: userId,
        org_id: org.id,
        full_name: adminName,
        email: adminEmail,
        role: "admin",
        active: true,
      });

      // 4. Done — show success with login details
      setResult({ org, orgName, adminName, adminEmail, tempPass, userId, fullyAutomated: true });
      setStep(2);
    } catch(e) { setErr("Error during onboarding: " + e.message); }
    setBusy(false);
  }

  return (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100, padding:"1rem" }}>
      <div style={{ background:B.card, border:`0.5px solid ${B.border}`, borderRadius:16, width:"100%", maxWidth:520, maxHeight:"90vh", overflowY:"auto" }}>

        {/* Header */}
        <div style={{ background:"#0F2A3E", borderRadius:"16px 16px 0 0", padding:"1rem 1.25rem", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:`0.5px solid ${B.border}` }}>
          <div>
            <p style={{ fontSize:14, fontWeight:700, color:B.text }}>Onboard new client</p>
            <p style={{ fontSize:11, color:B.textSub }}>Step {step} of 2</p>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:B.textSub, cursor:"pointer", fontSize:20 }}>×</button>
        </div>

        <div style={{ padding:"1.25rem" }}>
          {step === 1 && (
            <>
              <p style={{ fontSize:12, color:B.textSub, marginBottom:"1.25rem" }}>Fill in the new client organisation and their admin details. CONTROLIT will register the organisation and prepare the admin account.</p>
              {err && <div style={{ background:B.dangerLight, border:`0.5px solid ${B.danger}`, borderRadius:8, padding:"8px 12px", marginBottom:12, fontSize:12, color:B.danger }}>{err}</div>}

              <p style={{ fontSize:12, fontWeight:600, color:B.accent, marginBottom:10, letterSpacing:"0.04em" }}>ORGANISATION DETAILS</p>
              <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:"1.25rem" }}>
                <div>
                  <label style={{ fontSize:11, color:B.textSub, display:"block", marginBottom:4 }}>Company / organisation name *</label>
                  <input value={orgName} onChange={e=>setOrgName(e.target.value)} placeholder="e.g. XYZ Petroleum Ltd" />
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                  <div>
                    <label style={{ fontSize:11, color:B.textSub, display:"block", marginBottom:4 }}>Industry *</label>
                    <select value={industry} onChange={e=>setIndustry(e.target.value)}>
                      {["Oil & Gas","Construction","Energy","Mining","Petrochemical","Manufacturing","Marine","Aviation","Utilities","Other"].map(i=><option key={i}>{i}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{ fontSize:11, color:B.textSub, display:"block", marginBottom:4 }}>Country *</label>
                    <select value={country} onChange={e=>setCountry(e.target.value)}>
                      {["UAE","Saudi Arabia","Qatar","Kuwait","Bahrain","Oman","Nigeria","Ghana","UK","USA","Australia","Other"].map(c=><option key={c}>{c}</option>)}
                    </select>
                  </div>
                </div>
              </div>

              <p style={{ fontSize:12, fontWeight:600, color:B.accent, marginBottom:10, letterSpacing:"0.04em" }}>ADMIN ACCOUNT</p>
              <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:"1.25rem" }}>
                <div>
                  <label style={{ fontSize:11, color:B.textSub, display:"block", marginBottom:4 }}>Admin full name *</label>
                  <input value={adminName} onChange={e=>setAdminName(e.target.value)} placeholder="e.g. John Adeyemi" />
                </div>
                <div>
                  <label style={{ fontSize:11, color:B.textSub, display:"block", marginBottom:4 }}>Admin email address *</label>
                  <input value={adminEmail} onChange={e=>setAdminEmail(e.target.value)} placeholder="admin@client.com" type="email" />
                </div>
                <div>
                  <label style={{ fontSize:11, color:B.textSub, display:"block", marginBottom:4 }}>Temporary password (share with admin)</label>
                  <input value={tempPass} onChange={e=>setTempPass(e.target.value)} />
                </div>
              </div>

              <button onClick={onboard} disabled={busy} style={{ width:"100%", background:busy?"#2A3F55":B.accent, color:"#fff", border:"none", borderRadius:8, padding:"12px", fontSize:13, fontWeight:700, cursor:busy?"not-allowed":"pointer" }}>
                {busy ? "Registering organisation…" : "Register organisation & continue"}
              </button>
            </>
          )}

          {step === 2 && result && (
            <>
              <div style={{ background:"rgba(14,158,110,0.12)", border:`0.5px solid ${B.accent}`, borderRadius:10, padding:"1rem", marginBottom:"1.25rem" }}>
                <p style={{ fontSize:13, fontWeight:700, color:B.accent, marginBottom:4 }}>✓ Client onboarded successfully — fully automated</p>
                <p style={{ fontSize:12, color:B.textSub }}><strong style={{ color:B.text }}>{result.orgName}</strong> is live on CONTROLIT. Organisation, auth user, and admin profile all created automatically.</p>
              </div>

              <p style={{ fontSize:12, fontWeight:600, color:B.accent, marginBottom:10, letterSpacing:"0.04em" }}>SHARE THESE LOGIN DETAILS WITH THE ADMIN</p>

              <div style={{ background:"#0F2A3E", border:`0.5px solid ${B.border}`, borderRadius:10, padding:"1rem", marginBottom:"1.25rem" }}>
                <p style={{ fontSize:12, fontWeight:600, color:B.text, marginBottom:8 }}>Admin login credentials</p>
                <div style={{ background:"#0A1E2E", borderRadius:8, padding:"10px 12px", fontSize:12, fontFamily:"monospace", color:B.accent, lineHeight:2 }}>
                  <div>URL: <span style={{ color:B.text }}>https://njokukindness-droid.github.io/controlit-ptw</span></div>
                  <div>Email: <span style={{ color:B.text }}>{result.adminEmail}</span></div>
                  <div>Password: <span style={{ color:B.text }}>{result.tempPass}</span></div>
                  <div>Organisation: <span style={{ color:B.text }}>{result.orgName}</span></div>
                  <div>Role: <span style={{ color:B.text }}>Admin</span></div>
                </div>
              </div>

              <div style={{ background:"rgba(14,158,110,0.08)", border:`0.5px solid rgba(14,158,110,0.2)`, borderRadius:10, padding:"1rem", marginBottom:"1.25rem" }}>
                <p style={{ fontSize:12, color:B.textSub, lineHeight:1.6 }}>
                  The admin can log in immediately with these credentials. They should change their password after first login. From the Admin panel inside CONTROLIT, they can invite their own team members independently.
                </p>
              </div>

              <div style={{ display:"flex", gap:8 }}>
                <button onClick={()=>{ onSuccess(); onClose(); }} style={{ flex:1, background:B.accent, color:"#fff", border:"none", borderRadius:8, padding:"11px", fontSize:13, fontWeight:700, cursor:"pointer" }}>Done — close</button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Main Dashboard ────────────────────────────────────────────────
function OwnerDashboard({ token, onLogout }) {
  const [orgs, setOrgs]         = useState([]);
  const [users, setUsers]       = useState([]);
  const [permits, setPermits]   = useState([]);
  const [loading, setLoading]   = useState(true);
  const [tab, setTab]           = useState("orgs");
  const [showOnboard, setShowOnboard] = useState(false);

  async function load() {
    setLoading(true);
    const [o, u, p] = await Promise.all([
      sb.select(token, "organisations", "order=created_at.desc"),
      sb.select(token, "profiles", "order=full_name.asc"),
      sb.select(token, "permits", "order=created_at.desc"),
    ]);
    if (Array.isArray(o)) setOrgs(o);
    if (Array.isArray(u)) setUsers(u);
    if (Array.isArray(p)) setPermits(p);
    setLoading(false);
  }

  async function toggleSuspend(org) {
    const newActive = !org.active;
    const result = await sb.update(token, "organisations", `id=eq.${org.id}`, { active: newActive });
    if (result && !result.error) {
      setOrgs(prev => prev.map(o => o.id === org.id ? { ...o, active: newActive } : o));
    }
  }
 async function deleteOrg(org) {
    if (!window.confirm(`Permanently delete "${org.name}" and all its data? This cannot be undone.`)) return;
    const orgUsers = users.filter(u => u.org_id === org.id);
    for (const u of orgUsers) {
      await sb.deleteUser(u.id);
      await sb.delete(token, "profiles", `id=eq.${u.id}`);
    }
    await sb.delete(token, "permits", `org_id=eq.${org.id}`);
    await sb.delete(token, "permit_audit", `org_id=eq.${org.id}`);
    await sb.delete(token, "org_invites", `org_id=eq.${org.id}`);
    await sb.delete(token, "organisations", `id=eq.${org.id}`);
    // Update state immediately without waiting for reload
    setOrgs(prev => prev.filter(o => o.id !== org.id));
    setUsers(prev => prev.filter(u => u.org_id !== org.id));
    setPermits(prev => prev.filter(p => p.org_id !== org.id));
  }

  useEffect(()=>{ load(); },[]);

  const activeOrgs    = orgs.filter(o=>o.active).length;
  const activeUsers   = users.filter(u=>u.active).length;
  const activePermits = permits.filter(p=>p.status==="active").length;
  const pendingPermits = permits.filter(p=>p.status==="pending").length;

  const STATUS_COLORS = { active:"#0E9E6E", pending:"#D97B00", revoked:"#C0392B", closed:"#4A6070", rejected:"#C0392B", extension_pending:"#7F77DD" };

  return (
    <div style={{ minHeight:"100vh", padding:"1.5rem" }}>
      {showOnboard && <OnboardModal token={token} onClose={()=>setShowOnboard(false)} onSuccess={load} />}

      {/* Top bar */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"1.5rem" }}>
        <Logo />
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={()=>setShowOnboard(true)} style={{ background:B.accent, color:"#fff", border:"none", borderRadius:8, padding:"9px 16px", fontSize:12, fontWeight:700, cursor:"pointer" }}>+ Onboard new client</button>
          <button onClick={onLogout} style={{ background:"transparent", border:`0.5px solid ${B.border}`, color:B.textSub, borderRadius:8, padding:"9px 14px", fontSize:12, cursor:"pointer" }}>Sign out</button>
        </div>
      </div>

      {/* Stats */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:"1.5rem" }}>
        <StatCard label="Organisations" value={activeOrgs} color={B.accent} sub={orgs.length+" total registered"} />
        <StatCard label="Active users" value={activeUsers} color="#185FA5" sub={users.length+" total profiles"} />
        <StatCard label="Active permits" value={activePermits} color={B.warn} sub={permits.length+" total permits"} />
        <StatCard label="Pending approval" value={pendingPermits} color={B.danger} sub="across all orgs" />
      </div>

      {/* Tabs */}
      <div style={{ display:"flex", gap:6, marginBottom:"1rem" }}>
        {["orgs","users","permits"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{ border:`0.5px solid ${tab===t?B.accent:B.border}`, background:tab===t?"rgba(14,158,110,0.15)":"transparent", color:tab===t?B.accent:B.textSub, borderRadius:20, padding:"5px 16px", fontSize:12, cursor:"pointer", textTransform:"capitalize" }}>{t==="orgs"?"Organisations":t}</button>
        ))}
      </div>

      {loading && <Spinner />}

      {/* Organisations tab */}
      {!loading && tab==="orgs" && (
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {orgs.length===0 && <p style={{ color:B.textSub, fontSize:13 }}>No organisations yet. Onboard your first client.</p>}
          {orgs.map(o=>{
            const orgUsers   = users.filter(u=>u.org_id===o.id);
            const orgPermits = permits.filter(p=>p.org_id===o.id);
            const admin      = orgUsers.find(u=>u.role==="admin");
            return (
              <div key={o.id} style={{ background:B.card, border:`0.5px solid ${o.active?B.border:B.danger}`, borderRadius:12, padding:"1rem 1.25rem", opacity:o.active?1:0.75 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                  <div>
                    <p style={{ fontSize:14, fontWeight:700, color:B.text }}>{o.name}</p>
                    <p style={{ fontSize:11, color:B.textSub }}>{o.industry} · {o.country} · Slug: {o.slug}</p>
                    {!o.active && <p style={{ fontSize:11, color:B.danger, fontWeight:600, marginTop:4 }}>⚠ Suspended — users cannot log in</p>}
                  </div>
                  <span style={{ background:o.active?"rgba(14,158,110,0.15)":"rgba(192,57,43,0.15)", color:o.active?B.accent:B.danger, border:`0.5px solid ${o.active?B.accent:B.danger}`, borderRadius:20, padding:"2px 10px", fontSize:11, fontWeight:600 }}>{o.active?"Active":"Suspended"}</span>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:10 }}>
                  {[["Users",orgUsers.length],["Permits",orgPermits.length],["Admin",admin?admin.full_name:"Not set"]].map(([k,v])=>(
                    <div key={k} style={{ background:"#0F2A3E", borderRadius:8, padding:"8px 10px" }}>
                      <p style={{ fontSize:10, color:B.textSub }}>{k}</p>
                      <p style={{ fontSize:13, fontWeight:600, color:B.text }}>{v}</p>
                    </div>
                  ))}
                </div>
                <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                  <p style={{ fontSize:10, color:"#2A3F55", flex:1 }}>ID: {o.id}</p>
                  <button onClick={()=>toggleSuspend(o)} style={{ background:o.active?"rgba(217,123,0,0.15)":"rgba(14,158,110,0.15)", color:o.active?B.warn:B.accent, border:`0.5px solid ${o.active?B.warn:B.accent}`, borderRadius:8, padding:"6px 14px", fontSize:12, fontWeight:600, cursor:"pointer" }}>
                    {o.active ? "Suspend" : "Reactivate"}
                  </button>
                  <button onClick={()=>deleteOrg(o)} style={{ background:"rgba(192,57,43,0.15)", color:B.danger, border:`0.5px solid ${B.danger}`, borderRadius:8, padding:"6px 14px", fontSize:12, fontWeight:600, cursor:"pointer" }}>
                    Delete
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Users tab */}
      {!loading && tab==="users" && (
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {users.length===0 && <p style={{ color:B.textSub, fontSize:13 }}>No users yet.</p>}
          {users.map(u=>{
            const org = orgs.find(o=>o.id===u.org_id);
            return (
              <div key={u.id} style={{ background:B.card, border:`0.5px solid ${B.border}`, borderRadius:10, padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                  <div style={{ width:34, height:34, borderRadius:"50%", background:"rgba(14,158,110,0.15)", border:`0.5px solid ${B.accent}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, color:B.accent, flexShrink:0 }}>
                    {u.full_name.split(" ").map(n=>n[0]).join("").slice(0,2)}
                  </div>
                  <div>
                    <p style={{ fontSize:13, fontWeight:600, color:B.text }}>{u.full_name}</p>
                    <p style={{ fontSize:11, color:B.textSub }}>{u.email} · <span style={{ textTransform:"capitalize" }}>{(u.role||"").replace("_"," ")}</span></p>
                    <p style={{ fontSize:10, color:"#2A3F55" }}>{org?org.name:"Unknown org"}</p>
                  </div>
                </div>
                <span style={{ background:u.active?"rgba(14,158,110,0.15)":"rgba(74,96,112,0.2)", color:u.active?B.accent:B.textSub, border:`0.5px solid ${u.active?B.accent:B.border}`, borderRadius:20, padding:"2px 8px", fontSize:10, fontWeight:600 }}>{u.active?"Active":"Inactive"}</span>
              </div>
            );
          })}
        </div>
      )}

      {/* Permits tab — read only */}
      {!loading && tab==="permits" && (
        <div>
          <div style={{ background:"rgba(217,123,0,0.1)", border:`0.5px solid ${B.warn}`, borderRadius:8, padding:"8px 14px", marginBottom:"1rem" }}>
            <p style={{ fontSize:12, color:B.warn }}>Read-only view — permits across all organisations. No actions available from this panel.</p>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {permits.length===0 && <p style={{ color:B.textSub, fontSize:13 }}>No permits across any organisation yet.</p>}
            {permits.map(p=>{
              const org = orgs.find(o=>o.id===p.org_id);
              const sc  = STATUS_COLORS[p.status] || B.textSub;
              return (
                <div key={p.id} style={{ background:B.card, border:`0.5px solid ${B.border}`, borderRadius:10, padding:"10px 14px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
                    <div>
                      <p style={{ fontSize:13, fontWeight:600, color:B.text }}>{p.title}</p>
                      <p style={{ fontSize:11, color:B.textSub }}>{p.permit_number} · {p.area}</p>
                      <p style={{ fontSize:10, color:"#2A3F55", marginTop:2 }}>{org?org.name:"Unknown org"}</p>
                    </div>
                    <span style={{ background:`${sc}22`, color:sc, border:`0.5px solid ${sc}`, borderRadius:20, padding:"2px 10px", fontSize:11, fontWeight:600, textTransform:"capitalize", whiteSpace:"nowrap" }}>{(p.status||"").replace("_"," ")}</span>
                  </div>
                  <div style={{ display:"flex", gap:3 }}>
                    {[0,1,2,3].map(i=><div key={i} style={{ height:3, flex:1, borderRadius:2, background:i<p.stage?B.accent:i===p.stage?B.warn:B.border }} />)}
                    <span style={{ fontSize:10, color:B.textSub, marginLeft:4 }}>{p.stage}/4</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── App Root ──────────────────────────────────────────────────────
function App() {
  const [unlocked, setUnlocked] = useState(false);
  const [session, setSession]   = useState(null);
  const [busy, setBusy]         = useState(false);
  const [err, setErr]           = useState("");

  async function login() {
    setBusy(true); setErr("");
    try {
      const d = await sb.signIn(OWNER_EMAIL, OWNER_PASSWORD);
      if (d.error) { setErr("Auth failed: " + d.error.message); setBusy(false); return; }
      setSession({ token: d.access_token });
    } catch(e) { setErr("Connection error."); }
    setBusy(false);
  }

  function handleUnlock() {
    setUnlocked(true);
    login();
  }

  async function logout() {
    if (session) await sb.signOut(session.token);
    setSession(null); setUnlocked(false);
  }

  if (!unlocked)        return <GateScreen onUnlock={handleUnlock} />;
  if (busy || !session) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
      <Spinner />
      {err && <p style={{ color:"#C0392B", fontSize:13 }}>{err}</p>}
    </div>
  );

  return <OwnerDashboard token={session.token} onLogout={logout} />;
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
