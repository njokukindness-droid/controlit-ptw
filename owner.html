function slugify(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,""); }

// Encode Anthropic key as JSON array for safe DB storage — avoids raw key in DB text field
function encodeApiKey(p1,p2,p3){
  if (!p1&&!p2&&!p3) return null;
  return JSON.stringify([p1.trim(),p2.trim(),p3.trim()]);
}

  h: function(t){ return {"Content-Type":"application/json","apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+(t||SUPABASE_ANON_KEY),"Prefer":"return=representation"}; },
  signIn: async function(email,pass){ var r=await fetch(SUPABASE_URL+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"Content-Type":"application/json","apikey":SUPABASE_ANON_KEY},body:JSON.stringify({email,password:pass})}); return r.json(); },

  update: async function(t,table,match,data){ var r=await fetch(SUPABASE_URL+"/rest/v1/"+table+"?"+match,{method:"PATCH",headers:sb.h(t),body:JSON.stringify(data)}); return r.json(); },

function OnboardModal({token,onClose,onSuccess}){
  var [step,setStep]=useState(1);
  var [orgName,setOrgName]=useState(""); var [industry,setIndustry]=useState("Oil & Gas"); var [country,setCountry]=useState("UAE");
  var [adminName,setAdminName]=useState(""); var [adminEmail,setAdminEmail]=useState(""); var [tempPass,setTempPass]=useState("Controlit@2024!");
  var [kp1,setKp1]=useState(""); var [kp2,setKp2]=useState(""); var [kp3,setKp3]=useState("");
  var [showKey,setShowKey]=useState(false);
  var [busy,setBusy]=useState(false); var [err,setErr]=useState(""); var [result,setResult]=useState(null);

  async function onboard(){
    if(!orgName||!adminName||!adminEmail||!tempPass){setErr("All fields are required.");return;}
    setBusy(true); setErr("");
    try {
      var encodedKey = encodeApiKey(kp1,kp2,kp3);
      var slug = slugify(orgName);

      // Step 1: Check for duplicate slug
      var existing = await sb.select(token,"organisations","slug=eq."+slug+"&select=id,name");
      if(Array.isArray(existing)&&existing.length>0){
        setErr("An organisation with this name already exists: "+existing[0].name);
        setBusy(false); return;
      }

      // Step 2: Insert org — ignore response body, fetch back by slug
      await sb.insert(token,"organisations",{name:orgName,slug,industry,country,active:true,anthropic_key:encodedKey});

      // Step 3: Always fetch the org back by slug (works regardless of RLS response)
      var fetched = await sb.select(token,"organisations","slug=eq."+slug+"&order=created_at.desc&limit=1");
      var org = (Array.isArray(fetched)&&fetched[0]) ? fetched[0] : null;

      if(!org){
        setErr("Organisation was not created. Please check Supabase and try again.");
        setBusy(false); return;
      }

      // Step 4: Create auth user
      var authUser = await sb.createUser(adminEmail,tempPass);
      if(!authUser||!authUser.id){
        setErr("Organisation created but failed to create admin user: "+(authUser&&authUser.message?authUser.message:"Unknown error")+". Please add the admin manually from the Users tab.");
        setBusy(false); return;
      }

      // Step 5: Create profile
      await sb.insert(token,"profiles",{id:authUser.id,org_id:org.id,full_name:adminName,email:adminEmail,role:"admin",active:true});

      // Step 6: Done
      setResult({org,orgName,adminName,adminEmail,tempPass,hasKey:!!encodedKey});
      setStep(2); onSuccess();

    } catch(e){setErr("Unexpected error: "+e.message);}
    setBusy(false);
  }

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:"1rem"}}>
      <div style={{background:B.card,border:"0.5px solid "+B.border,borderRadius:16,width:"100%",maxWidth:520,maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{background:"#0F2A3E",borderRadius:"16px 16px 0 0",padding:"1rem 1.25rem",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"0.5px solid "+B.border,position:"sticky",top:0,zIndex:10}}>
          <div><p style={{fontSize:14,fontWeight:700,color:B.text}}>Onboard new client</p><p style={{fontSize:11,color:B.textSub}}>Step {step} of 2</p></div>
          <button onClick={onClose} style={{background:"none",border:"none",color:B.textSub,cursor:"pointer",fontSize:20}}>×</button>
        </div>
        <div style={{padding:"1.25rem"}}>
          {step===1&&(
            <>
              <p style={{fontSize:12,color:B.textSub,marginBottom:"1.25rem"}}>Fill in the client organisation and admin details. Everything will be created automatically.</p>
              {err&&<div style={{background:B.dangerLight,border:"0.5px solid "+B.danger,borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:B.danger}}>{err}</div>}

              <p style={{fontSize:12,fontWeight:600,color:B.accent,marginBottom:10,letterSpacing:"0.04em"}}>ORGANISATION DETAILS</p>
              <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:"1.25rem"}}>
                <div><label style={{fontSize:11,color:B.textSub,display:"block",marginBottom:4}}>Company name *</label><input value={orgName} onChange={function(e){setOrgName(e.target.value);}} placeholder="e.g. XYZ Petroleum Ltd"/></div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div><label style={{fontSize:11,color:B.textSub,display:"block",marginBottom:4}}>Industry *</label>
                    <select value={industry} onChange={function(e){setIndustry(e.target.value);}}>
                      {["Oil & Gas","Construction","Energy","Mining","Petrochemical","Manufacturing","Marine","Aviation","Utilities","Other"].map(function(i){return <option key={i}>{i}</option>;})}
                    </select>
                  </div>
                  <div><label style={{fontSize:11,color:B.textSub,display:"block",marginBottom:4}}>Country *</label>
                    <select value={country} onChange={function(e){setCountry(e.target.value);}}>
                      {["UAE","Saudi Arabia","Qatar","Kuwait","Bahrain","Oman","Nigeria","Ghana","UK","USA","Australia","Other"].map(function(c){return <option key={c}>{c}</option>;})}
                    </select>
                  </div>
                </div>
              </div>

              <p style={{fontSize:12,fontWeight:600,color:B.accent,marginBottom:10,letterSpacing:"0.04em"}}>ADMIN ACCOUNT</p>
              <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:"1.25rem"}}>
                <div><label style={{fontSize:11,color:B.textSub,display:"block",marginBottom:4}}>Admin full name *</label><input value={adminName} onChange={function(e){setAdminName(e.target.value);}} placeholder="e.g. John Adeyemi"/></div>
                <div><label style={{fontSize:11,color:B.textSub,display:"block",marginBottom:4}}>Admin email *</label><input value={adminEmail} onChange={function(e){setAdminEmail(e.target.value);}} placeholder="admin@client.com" type="email"/></div>
                <div><label style={{fontSize:11,color:B.textSub,display:"block",marginBottom:4}}>Temporary password</label><input value={tempPass} onChange={function(e){setTempPass(e.target.value);}}/></div>
              </div>

              {/* ── Anthropic API Key — 3-part split entry ── */}
              <div style={{background:"rgba(14,158,110,0.07)",border:"0.5px solid rgba(14,158,110,0.3)",borderRadius:10,padding:"1rem",marginBottom:"1.25rem"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <p style={{fontSize:12,fontWeight:600,color:B.accent,letterSpacing:"0.04em"}}>🤖 AI FEATURES — ANTHROPIC KEY</p>
                  <button onClick={function(){setShowKey(!showKey);}} style={{background:"none",border:"0.5px solid "+B.border,color:B.textSub,borderRadius:6,padding:"3px 10px",fontSize:11,cursor:"pointer"}}>{showKey?"Hide":"Show"} fields</button>
                </div>
                <p style={{fontSize:11,color:B.textSub,lineHeight:1.6,marginBottom:showKey?10:0}}>
                  Paste the Anthropic API key split at its two dots — Part 1, Part 2, Part 3. Leave blank to disable AI features for this org. This can be updated later.
                </p>
                {showKey&&(
                  <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:10}}>
                    <div><label style={{fontSize:11,color:B.textSub,display:"block",marginBottom:4}}>Part 1 — everything before the first dot</label><input value={kp1} onChange={function(e){setKp1(e.target.value);}} placeholder="sk-ant-api03-XXXXXXXXXX" style={{fontFamily:"monospace",fontSize:11,letterSpacing:"0.03em"}}/></div>
                    <div><label style={{fontSize:11,color:B.textSub,display:"block",marginBottom:4}}>Part 2 — middle segment</label><input value={kp2} onChange={function(e){setKp2(e.target.value);}} placeholder="XXXXXXXXXXXXXXXXXXXXXXXX" style={{fontFamily:"monospace",fontSize:11,letterSpacing:"0.03em"}}/></div>
                    <div><label style={{fontSize:11,color:B.textSub,display:"block",marginBottom:4}}>Part 3 — everything after the second dot</label><input value={kp3} onChange={function(e){setKp3(e.target.value);}} placeholder="XXXXXXXXXXXXXXXXXXXXXXXX" style={{fontFamily:"monospace",fontSize:11,letterSpacing:"0.03em"}}/></div>
                    {kp1&&kp2&&kp3&&<div style={{background:"rgba(14,158,110,0.12)",borderRadius:6,padding:"7px 10px"}}><p style={{fontSize:11,color:B.accent}}>✓ All 3 parts provided — key will be encoded and stored securely.</p></div>}
                    {(kp1||kp2||kp3)&&(!kp1||!kp2||!kp3)&&<div style={{background:"rgba(217,123,0,0.12)",borderRadius:6,padding:"7px 10px"}}><p style={{fontSize:11,color:B.warn}}>⚠ Enter all 3 parts or leave all blank.</p></div>}
                  </div>
                )}
              </div>

              <button onClick={onboard} disabled={busy} style={{width:"100%",background:busy?"#2A3F55":B.accent,color:"#fff",border:"none",borderRadius:8,padding:"12px",fontSize:13,fontWeight:700,cursor:busy?"not-allowed":"pointer"}}>
                {busy?"Registering…":"Register organisation & continue"}
              </button>
            </>
          )}
          {step===2&&result&&(
            <>
              <div style={{background:"rgba(14,158,110,0.12)",border:"0.5px solid "+B.accent,borderRadius:10,padding:"1rem",marginBottom:"1.25rem"}}>
                <p style={{fontSize:13,fontWeight:700,color:B.accent,marginBottom:4}}>✓ Client onboarded successfully</p>
                <p style={{fontSize:12,color:B.textSub,marginBottom:6}}><strong style={{color:B.text}}>{result.orgName}</strong> is live on CONTROLIT.</p>
                {result.hasKey
                  ? <p style={{fontSize:11,color:B.accent}}>🤖 AI features enabled — key stored securely.</p>
                  : <p style={{fontSize:11,color:B.warn}}>⚠ No API key — AI features disabled. Edit the org record in Supabase to add it later.</p>
                }
              </div>
              <p style={{fontSize:12,fontWeight:600,color:B.accent,marginBottom:10,letterSpacing:"0.04em"}}>SHARE THESE CREDENTIALS WITH THE ADMIN</p>
              <div style={{background:"#0F2A3E",border:"0.5px solid "+B.border,borderRadius:10,padding:"1rem",marginBottom:"1.25rem"}}>
                <div style={{background:"#0A1E2E",borderRadius:8,padding:"10px 12px",fontSize:12,fontFamily:"monospace",color:B.accent,lineHeight:2}}>
                  <div>URL: <span style={{color:B.text}}>https://getcontrolit.com/app.html</span></div>
                  <div>Email: <span style={{color:B.text}}>{result.adminEmail}</span></div>
                  <div>Password: <span style={{color:B.text}}>{result.tempPass}</span></div>
                  <div>Organisation: <span style={{color:B.text}}>{result.orgName}</span></div>
                  <div>Role: <span style={{color:B.text}}>Admin</span></div>
                </div>
              </div>
              <div style={{background:"rgba(14,158,110,0.08)",border:"0.5px solid rgba(14,158,110,0.2)",borderRadius:10,padding:"1rem",marginBottom:"1.25rem"}}>
                <p style={{fontSize:12,color:B.textSub,lineHeight:1.6}}>The admin can log in immediately and invite their team from the Admin panel inside the app.</p>
              </div>
              <button onClick={onClose} style={{width:"100%",background:B.accent,color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Done — close</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function OwnerDashboard({token,onLogout}){
  var [orgs,setOrgs]=useState([]); var [users,setUsers]=useState([]); var [permits,setPermits]=useState([]);
  var [loading,setLoading]=useState(true); var [tab,setTab]=useState("orgs"); var [showOnboard,setShowOnboard]=useState(false);
  var [fixOrg,setFixOrg]=useState(null); var [fixName,setFixName]=useState(""); var [fixEmail,setFixEmail]=useState(""); var [fixPass,setFixPass]=useState("Controlit@2024!"); var [fixBusy,setFixBusy]=useState(false); var [fixErr,setFixErr]=useState(""); var [fixDone,setFixDone]=useState(null);

  async function addAdminToOrg(org){
    if(!fixName||!fixEmail){setFixErr("Name and email required.");return;}
    setFixBusy(true); setFixErr("");
    try {
      var authUser=await sb.createUser(fixEmail,fixPass);
      if(!authUser||!authUser.id){setFixErr("Failed to create user: "+(authUser&&authUser.message?authUser.message:"Unknown"));setFixBusy(false);return;}
      await sb.insert(token,"profiles",{id:authUser.id,org_id:org.id,full_name:fixName,email:fixEmail,role:"admin",active:true});
      setFixDone({name:fixName,email:fixEmail,pass:fixPass});
      setFixName(""); setFixEmail(""); setFixPass("Controlit@2024!");
      load();
    } catch(e){setFixErr("Error: "+e.message);}
    setFixBusy(false);
  }

  async function load(){
    setLoading(true);
    var results=await Promise.all([sb.select(token,"organisations","order=created_at.desc"),sb.select(token,"profiles","order=full_name.asc"),sb.select(token,"permits","order=created_at.desc")]);
    if(Array.isArray(results[0]))setOrgs(results[0]); if(Array.isArray(results[1]))setUsers(results[1]); if(Array.isArray(results[2]))setPermits(results[2]);
    setLoading(false);
  }
  useEffect(function(){load();},[]);

  async function toggleSuspend(org){
    var n=!org.active; await sb.update(token,"organisations","id=eq."+org.id,{active:n});
    setOrgs(function(prev){return prev.map(function(o){return o.id===org.id?Object.assign({},o,{active:n}):o;});});
  }

  async function deleteOrg(org){
    if(!window.confirm('Permanently delete "'+org.name+'" and all its data? This cannot be undone.'))return;
    var orgUsers=users.filter(function(u){return u.org_id===org.id;});
    for(var i=0;i<orgUsers.length;i++){await sb.deleteUser(orgUsers[i].id); await sb.del(token,"profiles","id=eq."+orgUsers[i].id);}
    await sb.del(token,"permits","org_id=eq."+org.id);
    await sb.del(token,"permit_audit","org_id=eq."+org.id);
    await sb.del(token,"notifications","org_id=eq."+org.id);
    await sb.del(token,"organisations","id=eq."+org.id);
    setOrgs(function(prev){return prev.filter(function(o){return o.id!==org.id;});});
    setUsers(function(prev){return prev.filter(function(u){return u.org_id!==org.id;});});
    setPermits(function(prev){return prev.filter(function(p){return p.org_id!==org.id;});});
  }

  var activeOrgs=orgs.filter(function(o){return o.active;}).length;
  var activeUsers=users.filter(function(u){return u.active;}).length;
  var activePermits=permits.filter(function(p){return p.status==="active";}).length;
  var pendingPermits=permits.filter(function(p){return p.status==="pending";}).length;
  var SC={active:"#0E9E6E",pending:"#D97B00",revoked:"#C0392B",closed:"#4A6070",rejected:"#C0392B",extension_pending:"#7F77DD"};

  return (
    <div style={{minHeight:"100vh",padding:"1.5rem"}}>
      {showOnboard&&<OnboardModal token={token} onClose={function(){setShowOnboard(false);}} onSuccess={load}/>}
      {fixOrg&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:"1rem"}}>
          <div style={{background:B.card,border:"0.5px solid "+B.border,borderRadius:16,width:"100%",maxWidth:460,padding:"1.5rem"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem"}}>
              <div><p style={{fontSize:14,fontWeight:700,color:B.text}}>Add admin to {fixOrg.name}</p><p style={{fontSize:11,color:B.textSub}}>Create an admin account for this organisation</p></div>
              <button onClick={function(){setFixOrg(null);setFixDone(null);setFixErr("");}} style={{background:"none",border:"none",color:B.textSub,cursor:"pointer",fontSize:20}}>×</button>
            </div>
            {fixErr&&<div style={{background:B.dangerLight,border:"0.5px solid "+B.danger,borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:B.danger}}>{fixErr}</div>}
            {fixDone?(
              <div style={{background:B.accentLight,border:"0.5px solid "+B.accent,borderRadius:10,padding:"1rem"}}>
                <p style={{fontSize:13,fontWeight:700,color:B.accentBorder,marginBottom:8}}>✓ Admin account created</p>
                <div style={{background:"#fff",borderRadius:8,padding:"10px 12px",fontSize:12,fontFamily:"monospace",lineHeight:2}}>
                  <div>URL: https://getcontrolit.com/app.html</div>
                  <div>Email: {fixDone.email}</div>
                  <div>Password: {fixDone.pass}</div>
                  <div>Role: Admin</div>
                </div>
                <button onClick={function(){setFixOrg(null);setFixDone(null);}} style={{marginTop:12,width:"100%",background:B.accent,color:"#fff",border:"none",borderRadius:8,padding:"9px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Done</button>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div><label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Full name *</label><input value={fixName} onChange={function(e){setFixName(e.target.value);}} placeholder="Admin full name" style={{background:B.navy,border:"0.5px solid "+B.border,color:B.text,borderRadius:8}}/></div>
                <div><label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Email *</label><input value={fixEmail} onChange={function(e){setFixEmail(e.target.value);}} placeholder="admin@company.com" type="email" style={{background:B.navy,border:"0.5px solid "+B.border,color:B.text,borderRadius:8}}/></div>
                <div><label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Temp password</label><input value={fixPass} onChange={function(e){setFixPass(e.target.value);}} style={{background:B.navy,border:"0.5px solid "+B.border,color:B.text,borderRadius:8}}/></div>
                <button onClick={function(){addAdminToOrg(fixOrg);}} disabled={fixBusy} style={{marginTop:4,width:"100%",background:fixBusy?"#555":B.accent,color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:600,cursor:fixBusy?"not-allowed":"pointer"}}>{fixBusy?"Creating…":"Create admin account"}</button>
              </div>
            )}
          </div>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.5rem"}}>
        <Logo/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={function(){setShowOnboard(true);}} style={{background:B.accent,color:"#fff",border:"none",borderRadius:8,padding:"9px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Onboard new client</button>
          <button onClick={onLogout} style={{background:"transparent",border:"0.5px solid "+B.border,color:B.textSub,borderRadius:8,padding:"9px 14px",fontSize:12,cursor:"pointer"}}>Sign out</button>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:"1.5rem"}}>
        <StatCard label="Organisations" value={activeOrgs} color={B.accent} sub={orgs.length+" total"}/>
        <StatCard label="Active users" value={activeUsers} color="#185FA5" sub={users.length+" total"}/>
        <StatCard label="Active permits" value={activePermits} color={B.warn} sub={permits.length+" total"}/>
        <StatCard label="Pending" value={pendingPermits} color={B.danger} sub="across all orgs"/>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:"1rem"}}>
        {["orgs","users","permits"].map(function(t){return <button key={t} onClick={function(){setTab(t);}} style={{border:"0.5px solid "+(tab===t?B.accent:B.border),background:tab===t?"rgba(14,158,110,0.15)":"transparent",color:tab===t?B.accent:B.textSub,borderRadius:20,padding:"5px 16px",fontSize:12,cursor:"pointer",textTransform:"capitalize"}}>{t==="orgs"?"Organisations":t}</button>;})}
      </div>

      {loading&&<Spinner/>}

      {!loading&&tab==="orgs"&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {orgs.length===0&&<p style={{color:B.textSub,fontSize:13}}>No organisations yet.</p>}
          {orgs.map(function(o){
            var ou=users.filter(function(u){return u.org_id===o.id;}); var op=permits.filter(function(p){return p.org_id===o.id;}); var admin=ou.find(function(u){return u.role==="admin";});
            return (
              <div key={o.id} style={{background:B.card,border:"0.5px solid "+(o.active?B.border:B.danger),borderRadius:12,padding:"1rem 1.25rem",opacity:o.active?1:0.8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div>
                    <p style={{fontSize:14,fontWeight:700,color:B.text}}>{o.name}</p>
                    <p style={{fontSize:11,color:B.textSub}}>{o.industry} · {o.country}</p>
                    <p style={{fontSize:10,color:o.anthropic_key?B.accent:"#3A5060",marginTop:2}}>{o.anthropic_key?"🤖 AI enabled":"🤖 AI not configured"}</p>
                    {!o.active&&<p style={{fontSize:11,color:B.danger,fontWeight:600,marginTop:4}}>⚠ Suspended</p>}
                  </div>
                  <span style={{background:o.active?"rgba(14,158,110,0.15)":"rgba(192,57,43,0.15)",color:o.active?B.accent:B.danger,border:"0.5px solid "+(o.active?B.accent:B.danger),borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:600}}>{o.active?"Active":"Suspended"}</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
                  {[["Users",ou.length],["Permits",op.length],["Admin",admin?admin.full_name:"Not set"]].map(function(item){return <div key={item[0]} style={{background:"#0F2A3E",borderRadius:8,padding:"8px 10px"}}><p style={{fontSize:10,color:B.textSub}}>{item[0]}</p><p style={{fontSize:13,fontWeight:600,color:B.text}}>{item[1]}</p></div>;})}
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <p style={{fontSize:10,color:"#2A3F55",flex:1}}>ID: {o.id}</p>
                  <button onClick={function(){toggleSuspend(o);}} style={{background:o.active?B.warnLight:B.accentLight,color:o.active?B.warn:B.accent,border:"0.5px solid "+(o.active?B.warn:B.accent),borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{o.active?"Suspend":"Reactivate"}</button>
                  {!admin&&<button onClick={function(){setFixOrg(o);setFixDone(null);setFixErr("");}} style={{background:"rgba(127,119,221,0.15)",color:"#7F77DD",border:"0.5px solid #7F77DD",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Add admin</button>}
                  <button onClick={function(){deleteOrg(o);}} style={{background:B.dangerLight,color:B.danger,border:"0.5px solid "+B.danger,borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Delete</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {!loading&&tab==="users"&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {users.length===0&&<p style={{color:B.textSub,fontSize:13}}>No users yet.</p>}
          {users.map(function(u){
            var org=orgs.find(function(o){return o.id===u.org_id;});
            return (
              <div key={u.id} style={{background:B.card,border:"0.5px solid "+B.border,borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:"rgba(14,158,110,0.15)",border:"0.5px solid "+B.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:B.accent,flexShrink:0}}>{u.full_name.split(" ").map(function(n){return n[0];}).join("").slice(0,2)}</div>
                  <div><p style={{fontSize:13,fontWeight:600,color:B.text}}>{u.full_name}</p><p style={{fontSize:11,color:B.textSub}}>{u.email} · <span style={{textTransform:"capitalize"}}>{(u.role||"").replace("_"," ")}</span></p><p style={{fontSize:10,color:"#2A3F55"}}>{org?org.name:"Unknown org"}</p></div>
                </div>
                <span style={{background:u.active?"rgba(14,158,110,0.15)":"rgba(74,96,112,0.2)",color:u.active?B.accent:B.textSub,border:"0.5px solid "+(u.active?B.accent:B.border),borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:600}}>{u.active?"Active":"Inactive"}</span>
              </div>
            );
          })}
        </div>
      )}

      {!loading&&tab==="permits"&&(
        <div>
          <div style={{background:"rgba(217,123,0,0.1)",border:"0.5px solid "+B.warn,borderRadius:8,padding:"8px 14px",marginBottom:"1rem"}}>
            <p style={{fontSize:12,color:B.warn}}>Read-only view — permits across all organisations.</p>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {permits.length===0&&<p style={{color:B.textSub,fontSize:13}}>No permits yet.</p>}
            {permits.map(function(p){
              var org=orgs.find(function(o){return o.id===p.org_id;}); var sc=SC[p.status]||B.textSub;
              return (
                <div key={p.id} style={{background:B.card,border:"0.5px solid "+B.border,borderRadius:10,padding:"10px 14px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                    <div><p style={{fontSize:13,fontWeight:600,color:B.text}}>{p.title}</p><p style={{fontSize:11,color:B.textSub}}>{p.permit_number} · {p.area}</p><p style={{fontSize:10,color:"#2A3F55",marginTop:2}}>{org?org.name:"Unknown org"}</p></div>
                    <span style={{background:sc+"22",color:sc,border:"0.5px solid "+sc,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:600,textTransform:"capitalize",whiteSpace:"nowrap"}}>{(p.status||"").replace("_"," ")}</span>
                  </div>
                  <div style={{display:"flex",gap:3}}>{[0,1,2,3].map(function(i){return <div key={i} style={{height:3,flex:1,borderRadius:2,background:i<p.stage?B.accent:i===p.stage?B.warn:B.border}}/>;})}<span style={{fontSize:10,color:B.textSub,marginLeft:4}}>{p.stage}/4</span></div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  var [unlocked,setUnlocked]=useState(false); var [session,setSession]=useState(null); var [busy,setBusy]=useState(false); var [err,setErr]=useState("");
  async function login(){ setBusy(true); setErr(""); try { var d=await sb.signIn(OWNER_EMAIL,OWNER_SUPABASE_PASS); if(d.error){setErr("Auth failed: "+d.error.message);setBusy(false);return;} setSession({token:d.access_token}); } catch(e){setErr("Connection error.");} setBusy(false); }
  function handleUnlock(){ setUnlocked(true); login(); }
  async function logout(){ if(session)await sb.signOut(session.token); setSession(null); setUnlocked(false); }
  if(!unlocked)return <GateScreen onUnlock={handleUnlock}/>;
  if(busy||!session)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}><Spinner/>{err&&<p style={{color:B.danger,fontSize:13}}>{err}</p>}</div>;
  return <OwnerDashboard token={session.token} onLogout={logout}/>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
