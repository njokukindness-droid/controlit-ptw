  return (role||"").replace(/_/g," ").replace(/\b\w/g, c => c.toUpperCase());

function useOwnerAccess() {
  const [clicks, setClicks] = useState(0);
  const timer = React.useRef(null);
  function handleClick() {
    setClicks(c => {
      const next = c+1;
      if (next>=5) { window.location.href="owner.html"; return 0; }
      clearTimeout(timer.current);
      timer.current = setTimeout(()=>setClicks(0), 1500);
      return next;
    });
  }
  return handleClick;
}

// ── Account Setup ─────────────────────────────────────────────────
function AccountSetup({ session, onComplete }) {
  const [fullName, setFullName] = useState(session.profile.full_name||"");
  const [newPass, setNewPass]   = useState("");
  const [confirm, setConfirm]   = useState("");
  const [busy, setBusy]         = useState(false);
  const [err, setErr]           = useState("");

  async function save() {
    if (!fullName.trim())        { setErr("Please enter your full name."); return; }
    if (newPass.length<8)        { setErr("Password must be at least 8 characters."); return; }
    if (newPass!==confirm)       { setErr("Passwords do not match."); return; }
    setBusy(true); setErr("");
    const r = await sb.updatePassword(session.token, newPass);
    if (r.error) { setErr(r.error.message||"Failed to update password."); setBusy(false); return; }
    await sb.update(session.token,"profiles",`id=eq.${session.userId}`,{full_name:fullName});
    onComplete({...session,profile:{...session.profile,full_name:fullName}});
    setBusy(false);
  }

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F2640 0%,#1A3A5C 60%,#0E4D38 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem"}}>
      <div style={{marginBottom:"2rem",textAlign:"center"}}>
        <svg width="56" height="56" viewBox="0 0 32 32" fill="none" style={{marginBottom:12}}>
          <rect width="32" height="32" rx="8" fill={B.accent}/>
          <path d="M8 16 L14 22 L24 10" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
          <circle cx="16" cy="16" r="10" stroke="#fff" strokeWidth="1.5" fill="none" opacity="0.4"/>
        </svg>
        <div style={{color:B.white,fontWeight:800,fontSize:26,letterSpacing:"0.06em"}}>CONTROLIT</div>
        <div style={{color:"rgba(255,255,255,0.55)",fontSize:13,marginTop:4}}>Complete your account setup</div>
      </div>
      <div style={{background:"rgba(255,255,255,0.07)",backdropFilter:"blur(12px)",border:"0.5px solid rgba(255,255,255,0.15)",borderRadius:16,padding:"2rem",width:"100%",maxWidth:380}}>
        <p style={{color:"rgba(255,255,255,0.8)",fontSize:13,marginBottom:"1.25rem",fontWeight:500}}>
          Welcome to <strong style={{color:B.accent}}>{session.org.name}</strong>. Set your name and a secure password.
        </p>
        {err&&<div style={{background:"rgba(192,57,43,0.2)",border:"0.5px solid rgba(192,57,43,0.5)",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#ffaaaa"}}>{err}</div>}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11,color:"rgba(255,255,255,0.55)",display:"block",marginBottom:4}}>Full name *</label>
          <input value={fullName} onChange={e=>setFullName(e.target.value)} placeholder="Full name" style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:B.white,borderRadius:8}}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11,color:"rgba(255,255,255,0.55)",display:"block",marginBottom:4}}>New password * (min 8 chars)</label>
          <input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="Choose a strong password" style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:B.white,borderRadius:8}}/>
        </div>
        <div style={{marginBottom:"1.5rem"}}>
          <label style={{fontSize:11,color:"rgba(255,255,255,0.55)",display:"block",marginBottom:4}}>Confirm password *</label>

        </div>

// ── Change Password ───────────────────────────────────────────────
function ChangePassword({ session, onBack }) {
  const [current, setCurrent] = useState("");
  const [newPass, setNewPass] = useState("");
  const [confirm, setConfirm] = useState("");
  const [busy, setBusy]       = useState(false);
  const [err, setErr]         = useState("");
  const [success, setSuccess] = useState(false);

  async function save() {
    if (!current)            { setErr("Enter your current password."); return; }
    if (newPass.length<8)    { setErr("New password must be at least 8 characters."); return; }
    if (newPass!==confirm)   { setErr("Passwords do not match."); return; }
    if (newPass===current)   { setErr("New password must be different from current."); return; }
    setBusy(true); setErr("");
    const check = await sb.signIn(session.profile.email, current);
    if (check.error) { setErr("Current password is incorrect."); setBusy(false); return; }
    const r = await sb.updatePassword(session.token, newPass);
    if (r.error) { setErr(r.error.message||"Failed to update password."); setBusy(false); return; }
    setSuccess(true); setBusy(false);
  }

  return (
    <div>
      <Topbar title="Change Password" onBack={onBack}/>
      <div style={{padding:"1.25rem"}}>
        {success ? (
          <div style={{textAlign:"center",padding:"2rem 1rem"}}>
            <div style={{fontSize:48,marginBottom:16}}>✓</div>
            <p style={{fontSize:16,fontWeight:600,color:B.text,marginBottom:8}}>Password updated successfully</p>
            <p style={{fontSize:13,color:B.textSub,marginBottom:"1.5rem"}}>Your new password is active.</p>
            <button onClick={onBack} style={{background:B.accent,color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Back to dashboard</button>
          </div>
        ) : (
          <>
            <div style={{background:B.neutral,border:`0.5px solid ${B.neutralBorder}`,borderRadius:10,padding:"10px 14px",marginBottom:"1.25rem"}}>
              <p style={{fontSize:12,color:B.textSub}}>Signed in as <strong style={{color:B.text}}>{session.profile.email}</strong></p>
            </div>
            {err&&<div style={{background:B.dangerLight,border:`0.5px solid ${B.danger}`,borderRadius:8,padding:"10px 12px",marginBottom:12,fontSize:13,color:B.danger}}>{err}</div>}
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div>
                <label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Current password *</label>
                <input type="password" value={current} onChange={e=>setCurrent(e.target.value)} placeholder="Enter current password"/>
              </div>
              <div>
                <label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>New password * (min 8 characters)</label>
                <input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="Choose a strong password"/>
              </div>
              <div>
                <label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Confirm new password *</label>
                <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="Repeat new password"/>
              </div>
            </div>
            <button onClick={save} disabled={busy} style={{marginTop:"1.5rem",width:"100%",background:busy?"#999":B.primary,color:"#fff",border:"none",borderRadius:8,padding:"12px",fontSize:13,fontWeight:700,cursor:busy?"not-allowed":"pointer"}}>
              {busy?"Updating…":"Update password"}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ── Login ─────────────────────────────────────────────────────────
function Login({ onLogin }) {
  const [email, setEmail] = useState("");
  const [pass, setPass]   = useState("");
  const [busy, setBusy]   = useState(false);
  const [err, setErr]     = useState("");
  const handleOwnerClick  = useOwnerAccess();

  async function go() {
    if (!email||!pass) return;
    setBusy(true); setErr("");
    try {
      const d = await sb.signIn(email, pass);
      if (d.error) { setErr(d.error.message||"Login failed."); setBusy(false); return; }
      const token = d.access_token, uid = d.user?.id;
      const profiles = await sb.select(token,"profiles",`id=eq.${uid}`);
      if (!profiles||!profiles[0]) { setErr("No profile found. Contact your administrator."); setBusy(false); return; }
      const profile = profiles[0];
      const orgs = await sb.select(token,"organisations",`id=eq.${profile.org_id}`);
      const org = orgs&&orgs[0] ? orgs[0] : {name:"Your Organisation"};
      if (org&&org.active===false) { setErr("Your organisation account has been suspended. Please contact support at kindnessnjoku@outlook.com"); setBusy(false); return; }
      onLogin({token,userId:uid,profile,org,firstTime:false});
    } catch(e) { setErr("Connection error. Please try again."); }
    setBusy(false);
  }

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F2640 0%,#1A3A5C 60%,#0E4D38 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem"}}>
      <div style={{marginBottom:"2rem",textAlign:"center"}}>
        <svg width="60" height="60" viewBox="0 0 32 32" fill="none" onClick={handleOwnerClick} style={{marginBottom:12,cursor:"default"}}>
          <rect width="32" height="32" rx="8" fill={B.accent}/>
          <path d="M8 16 L14 22 L24 10" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
          <circle cx="16" cy="16" r="10" stroke="#fff" strokeWidth="1.5" fill="none" opacity="0.4"/>
        </svg>
        <div style={{color:B.white,fontWeight:800,fontSize:30,letterSpacing:"0.06em"}}>CONTROLIT</div>
        <div style={{color:"rgba(255,255,255,0.55)",fontSize:13,marginTop:4}}>Permit to Work Management Platform</div>
      </div>
      <div style={{background:"rgba(255,255,255,0.07)",backdropFilter:"blur(12px)",border:"0.5px solid rgba(255,255,255,0.15)",borderRadius:16,padding:"2rem",width:"100%",maxWidth:360}}>
        <p style={{color:"rgba(255,255,255,0.8)",fontSize:13,marginBottom:"1.25rem",fontWeight:500}}>Sign in to your account</p>
        {err&&<div style={{background:"rgba(192,57,43,0.2)",border:"0.5px solid rgba(192,57,43,0.5)",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#ffaaaa"}}>{err}</div>}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:11,color:"rgba(255,255,255,0.55)",display:"block",marginBottom:4}}>Email address</label>
          <input value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="you@company.com" style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:B.white,borderRadius:8}}/>
        </div>
        <div style={{marginBottom:"1.5rem"}}>
          <label style={{fontSize:11,color:"rgba(255,255,255,0.55)",display:"block",marginBottom:4}}>Password</label>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="••••••••" style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:B.white,borderRadius:8}}/>
        </div>
        <button onClick={go} disabled={busy} style={{width:"100%",background:busy?"#555":B.accent,color:B.white,border:"none",borderRadius:8,padding:"12px",fontSize:14,fontWeight:700,cursor:busy?"not-allowed":"pointer"}}>
          {busy?"Signing in…":"Sign in"}
        </button>
        <p style={{textAlign:"center",color:"rgba(255,255,255,0.3)",fontSize:11,marginTop:"1rem"}}>Access by invitation only · CONTROLIT v1.0</p>
      </div>
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────
function Dashboard({ session, permits, loading, error, onSelect, onNew, onNotifs, unread, onAdmin, onWorkflow, onChangePass, onLogout }) {
  const [filter, setFilter] = useState("all");
  const counts = {
    active:  permits.filter(p=>p.status==="active").length,
    pending: permits.filter(p=>p.status==="pending"||p.status==="extension_pending").length,
    revoked: permits.filter(p=>p.status==="revoked").length,
    closed:  permits.filter(p=>p.status==="closed").length,
  };
  const filtered = filter==="all" ? permits : permits.filter(p=>p.status===filter||(filter==="pending"&&p.status==="extension_pending"));

  return (
    <div>
      <Topbar right={
        <div style={{display:"flex",gap:6}}>
          <button onClick={onNotifs} style={{border:"0.5px solid rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.1)",color:"#fff",borderRadius:6,padding:"6px 12px",fontSize:11,cursor:"pointer",position:"relative"}}>
            🔔{unread>0&&<span style={{position:"absolute",top:-4,right:-4,background:B.danger,color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{unread}</span>}
          </button>
          {session.profile.role==="admin"&&<button onClick={onAdmin} style={{border:"0.5px solid rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.1)",color:"#fff",borderRadius:6,padding:"6px 12px",fontSize:11,cursor:"pointer"}}>Admin</button>}
          <button onClick={onWorkflow} style={{border:"0.5px solid rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.1)",color:"#fff",borderRadius:6,padding:"6px 12px",fontSize:11,cursor:"pointer"}}>Workflow</button>
          <button onClick={onChangePass} style={{border:"0.5px solid rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.1)",color:"#fff",borderRadius:6,padding:"6px 12px",fontSize:11,cursor:"pointer"}}>🔑</button>
          <button onClick={onLogout} style={{border:"0.5px solid rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.1)",color:"#fff",borderRadius:6,padding:"6px 12px",fontSize:11,cursor:"pointer"}}>Sign out</button>
        </div>
      }/>
      <div style={{padding:"1.25rem 1.25rem 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
          <div>
            <p style={{fontSize:13,color:B.textSub}}>Welcome, <strong style={{color:B.text}}>{session.profile.full_name}</strong></p>
            <p style={{fontSize:11,color:B.textSub}}>{session.org.name} · {roleLabel(session.profile.role)}</p>
          </div>
          <button onClick={onNew} style={{background:B.accent,color:"#fff",border:"none",borderRadius:8,padding:"9px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ New permit</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:"1.25rem"}}>
          {[["Active",counts.active,B.accent],["Pending",counts.pending,B.warn],["Revoked",counts.revoked,B.danger],["Closed",counts.closed,B.textSub]].map(([l,v,c])=>(
            <div key={l} style={{background:B.neutral,borderRadius:8,padding:"12px 14px",borderTop:`3px solid ${c}`}}>
              <p style={{fontSize:11,color:B.textSub}}>{l}</p>
              <p style={{fontSize:22,fontWeight:700,color:c}}>{v}</p>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:6,marginBottom:"1rem",flexWrap:"wrap"}}>
          {["all","active","pending","revoked","closed"].map(s=>(
            <button key={s} onClick={()=>setFilter(s)} style={{border:`0.5px solid ${filter===s?B.primary:B.neutralBorder}`,background:filter===s?B.primary:"transparent",color:filter===s?"#fff":B.textSub,borderRadius:20,padding:"4px 14px",fontSize:12,cursor:"pointer",textTransform:"capitalize"}}>{s==="all"?"All permits":s}</button>
          ))}
        </div>
      </div>
      <div style={{padding:"0 1.25rem 2rem"}}>
        {loading&&<Spinner/>}
        {error&&<Err msg={error}/>}
        {!loading&&!error&&filtered.length===0&&(
          <div style={{textAlign:"center",padding:"3rem 1rem"}}>
            <p style={{fontSize:32}}>📋</p>
            <p style={{fontSize:14,fontWeight:600,color:B.text,marginTop:8}}>No permits yet</p>
            <p style={{fontSize:13,color:B.textSub}}>Create your first permit to get started.</p>
          </div>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {filtered.map(p=>{
            const t = pt(p.type);
            return (
              <div key={p.id} onClick={()=>onSelect(p)} style={{background:"#fff",border:`0.5px solid ${B.neutralBorder}`,borderRadius:10,padding:"12px 14px",cursor:"pointer",borderLeft:`3px solid ${t.color||B.textSub}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div>
                    <p style={{fontSize:13,fontWeight:600,color:B.text}}>{p.title}</p>
                    <p style={{fontSize:11,color:B.textSub}}>{p.permit_number} · {p.area}</p>
                  </div>
                  <span style={{background:B.accentLight,color:B.accentBorder,border:`0.5px solid ${B.accent}`,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:600,textTransform:"capitalize",whiteSpace:"nowrap"}}>{(p.status||"").replace("_"," ")}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{background:B.neutral,color:B.textSub,border:`0.5px solid ${B.neutralBorder}`,borderRadius:20,padding:"2px 10px",fontSize:11}}>{t.label||p.type}</span>
                  <div style={{display:"flex",gap:3,minWidth:100,alignItems:"center"}}>
                    {[0,1,2,3].map(i=><div key={i} style={{height:4,flex:1,borderRadius:2,background:i<p.stage?B.accent:i===p.stage?B.warn:"#D1D8E0"}}/>)}
                    <span style={{fontSize:10,color:B.textSub,marginLeft:4}}>{p.stage}/4</span>
                  </div>
                </div>
                {(p.extensions||0)>=MAX_EXT&&p.status==="active"&&<p style={{fontSize:10,color:B.danger,marginTop:5}}>Max extensions reached — new permit required after closure</p>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Permit Detail ─────────────────────────────────────────────────
// FIX: action() now has role guard, updates selected permit locally,
//      and calls sb.notify() to fan-out notifications to all org members.
function PermitDetail({ permit: initialPermit, session, onBack, onRefresh }) {
  const [tab, setTab]       = useState("detail");
  const [audit, setAudit]   = useState([]);
  const [busy, setBusy]     = useState(false);
  const [errMsg, setErrMsg] = useState("");
  // FIX: keep a local copy of the permit so UI updates immediately after action
  const [permit, setPermit] = useState(initialPermit);
  const t = pt(permit.type);

  function loadAudit() {
    sb.select(session.token,"permit_audit",`permit_id=eq.${permit.id}&order=created_at.asc`)
      .then(d=>{ if(Array.isArray(d)) setAudit(d); });
  }

  useEffect(()=>{ loadAudit(); },[permit.id]);

  async function action(act) {
    setErrMsg("");

    // ── FIX: Role guard ────────────────────────────────────────────────────────
    // For approve actions, verify the logged-in user's role matches the current stage.
    // admin can always act (for testing / override scenarios).
    const role = session.profile.role;
    if (act === "approve" && role !== "admin") {
      const expectedStage = ROLE_STAGE[role];
      if (expectedStage === undefined) {
        setErrMsg("Your role is not part of the approval chain.");
        return;
      }
      if (permit.stage !== expectedStage) {
        setErrMsg(`This permit is at stage ${permit.stage}. Your role (${roleLabel(role)}) approves at stage ${expectedStage}.`);
        return;
      }
    }
    if (act === "issue" && role !== "issuer" && role !== "admin") {
      setErrMsg("Only the Issuer can issue a permit.");
      return;
    }

    setBusy(true);
    let ns=permit.status, st=permit.stage, ex=permit.extensions||0;

    if      (act==="approve")      { st=Math.min(permit.stage+1,4); ns=st>=4?"active":"pending"; }
    else if (act==="issue")        { st=4; ns="active"; }
    else if (act==="reject")       ns="rejected";
    else if (act==="suspend")      ns="revoked";
    else if (act==="close")        ns="closed";
    else if (act==="ext_request")  ns="extension_pending";
    else if (act==="ext_approve")  { ns="active"; ex=(permit.extensions||0)+1; }
    else if (act==="ext_reject")   ns="active";

    const actionLabels = {
      approve:     "Approved & forwarded",
      issue:       "Permit issued",
      reject:      "Rejected",
      suspend:     "Permit suspended",
      close:       "Permit closed",
      ext_request: "Extension requested",
      ext_approve: "Extension approved",
      ext_reject:  "Extension rejected",
    };

    // ── FIX: notification event key map ───────────────────────────────────────
    const notifEvent = {
      approve:     permit.stage===3 ? "osh_approved" : "aa_approved",
      issue:       "issued",
      reject:      "rejected",
      suspend:     "suspended",
      close:       "closed",
      ext_request: "ext_requested",
      ext_approve: "ext_approved",
      ext_reject:  "ext_rejected",
    };

    const extraFields = {};
    if (act==="issue")  { extraFields.issued_by=session.userId; extraFields.issued_at=nowStr(); }
    if (act==="close")  { extraFields.closed_at=nowStr(); }

    // ── DB update ─────────────────────────────────────────────────────────────
    const updateRes = await sb.update(
      session.token, "permits", `id=eq.${permit.id}`,
      { status:ns, stage:st, extensions:ex, ...extraFields }
    );

    // Check for errors returned by Supabase (RLS block returns empty array or error)
    if (!updateRes || (Array.isArray(updateRes) && updateRes.length === 0 && !updateRes.error)) {
      // Supabase PATCH with Prefer:return=representation returns the updated row
      // An empty array here usually means RLS blocked the write — surface the error
      console.warn("Permit update returned empty — possible RLS block. Response:", updateRes);
    }

    // ── Audit entry ───────────────────────────────────────────────────────────
    await sb.insert(session.token,"permit_audit",{
      org_id:    session.profile.org_id,
      permit_id: permit.id,
      user_id:   session.userId,
      user_name: session.profile.full_name,
      user_role: roleLabel(session.profile.role),
      action:    actionLabels[act]||act,
      note:      "",
    });

    // ── FIX: Notify all org members ───────────────────────────────────────────
    await sb.notify(
      session.token,
      session.profile.org_id,
      permit.id,
      permit.permit_number,
      permit.title,
      notifEvent[act] || act,
      session.profile.full_name
    );

    // ── FIX: Update local permit state so UI reflects change immediately ──────
    const updatedPermit = { ...permit, status:ns, stage:st, extensions:ex, ...extraFields };
    setPermit(updatedPermit);

    // Also reload audit trail to show the new entry
    loadAudit();

    // Refresh parent permits list in background
    await onRefresh();
    setBusy(false);
  }

  const canExtend = permit.status==="active"&&(permit.extensions||0)<MAX_EXT;

  return (
    <div>
      <Topbar title={permit.permit_number} onBack={onBack}/>
      <div style={{padding:"1.25rem"}}>
        {errMsg&&<Err msg={errMsg}/>}

        <div style={{background:B.neutral,border:`0.5px solid ${B.neutralBorder}`,borderLeft:`3px solid ${t.color||B.textSub}`,borderRadius:10,padding:"1rem 1.25rem",marginBottom:"1rem"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <p style={{fontSize:11,color:B.textSub,fontWeight:600}}>{t.label}</p>
              <h2 style={{fontSize:16,fontWeight:600,color:B.text,margin:"4px 0 2px"}}>{permit.title}</h2>
              <p style={{fontSize:12,color:B.textSub}}>{permit.area}</p>
            </div>
            <span style={{background:B.accentLight,color:B.accentBorder,border:`0.5px solid ${B.accent}`,borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:600,textTransform:"capitalize",whiteSpace:"nowrap"}}>{(permit.status||"").replace("_"," ")}</span>
          </div>
        </div>

        <div style={{display:"flex",gap:6,marginBottom:"1rem"}}>
          {["detail","audit"].map(tb=>(
            <button key={tb} onClick={()=>setTab(tb)} style={{border:`0.5px solid ${tab===tb?B.primary:B.neutralBorder}`,background:tab===tb?B.primary:"transparent",color:tab===tb?"#fff":B.textSub,borderRadius:20,padding:"5px 14px",fontSize:12,cursor:"pointer",textTransform:"capitalize"}}>{tb}</button>
          ))}
        </div>

        {tab==="detail"&&(
          <>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:"1rem"}}>
              {[["Team leader",permit.requester_name],["Supervisor",permit.supervisor_name],["Date",permit.created_at?new Date(permit.created_at).toLocaleDateString():"—"],["Extensions",(permit.extensions||0)+" / "+MAX_EXT]].map(([k,v])=>(
                <div key={k} style={{background:B.neutral,borderRadius:8,padding:"10px 12px"}}>
                  <p style={{fontSize:11,color:B.textSub}}>{k}</p>
                  <p style={{fontSize:13,fontWeight:600,color:B.text}}>{v}</p>
                </div>
              ))}
            </div>
            <p style={{fontSize:12,color:B.textSub,marginBottom:8}}>Approval progress</p>
            {STAGES.map((s,i)=>{
              const sn=i+1, done=sn<permit.stage||(sn===4&&permit.status==="active"), cur=sn===permit.stage&&permit.status==="pending";
              return (
                <div key={s} style={{display:"flex",alignItems:"center",gap:10,background:done?B.accentLight:cur?B.warnLight:B.neutral,border:`0.5px solid ${done?B.accent:cur?B.warn:B.neutralBorder}`,borderRadius:8,padding:"8px 12px",marginBottom:6}}>
                  <div style={{width:20,height:20,borderRadius:"50%",flexShrink:0,background:done?B.accent:cur?B.warn:"#C0CAD5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",fontWeight:700}}>{done?"✓":sn}</div>
                  <div>
                    <p style={{fontSize:12,fontWeight:600,color:done?B.accentBorder:cur?B.warn:B.textSub}}>{s}</p>
                    <p style={{fontSize:10,color:done?B.accent:cur?B.warn:B.textSub}}>{done?"Approved":cur?"Awaiting approval":"Pending"}</p>
                  </div>
                </div>
              );
            })}
          </>
        )}

        {tab==="audit"&&(
          <div>
            <p style={{fontSize:12,color:B.textSub,marginBottom:10,fontWeight:500}}>Audit trail</p>
            {audit.length===0&&<p style={{fontSize:12,color:B.textSub}}>No activity yet.</p>}
            {audit.map((e,i)=>(
              <div key={e.id} style={{display:"flex",gap:10,marginBottom:10}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:B.neutral,border:`0.5px solid ${B.neutralBorder}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,color:B.text}}>{(e.user_name||"?")[0]}</div>
                  {i<audit.length-1&&<div style={{width:1,flex:1,background:B.neutralBorder,margin:"3px 0"}}/>}
                </div>
                <div style={{paddingBottom:10,flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <p style={{fontSize:12,fontWeight:600,color:B.text}}>{e.action}</p>
                    <p style={{fontSize:10,color:B.textSub}}>{e.created_at?new Date(e.created_at).toLocaleString():""}</p>
                  </div>
                  <p style={{fontSize:11,color:B.textSub}}>{e.user_name} · {e.user_role}</p>
                  {e.note&&<p style={{fontSize:11,color:B.textSub,background:B.neutral,borderRadius:6,padding:"4px 8px",marginTop:3}}>{e.note}</p>}
                </div>
              </div>
            ))}
          </div>
        )}

        <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:8}}>
          {permit.status==="pending"&&permit.stage!==4&&(
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>action("approve")} disabled={busy} style={{flex:1,background:busy?"#999":B.accent,color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:12,fontWeight:600,cursor:busy?"not-allowed":"pointer"}}>
                {busy?"Processing…":"Approve & forward"}
              </button>
              <button onClick={()=>action("reject")} disabled={busy} style={{flex:1,border:`0.5px solid ${B.danger}`,background:B.dangerLight,color:B.danger,borderRadius:8,padding:"10px",fontSize:12,cursor:busy?"not-allowed":"pointer"}}>Reject</button>
            </div>
          )}
          {permit.status==="pending"&&permit.stage===4&&(
            <button onClick={()=>action("issue")} disabled={busy} style={{width:"100%",background:busy?"#999":B.accent,color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:13,fontWeight:700,cursor:busy?"not-allowed":"pointer"}}>
              {busy?"Processing…":"Issue permit"}
            </button>
          )}
          {permit.status==="active"&&(
            <div style={{display:"flex",gap:8}}>
              {canExtend&&<button onClick={()=>action("ext_request")} disabled={busy} style={{flex:1,border:`0.5px solid ${B.warn}`,background:B.warnLight,color:B.warn,borderRadius:8,padding:"10px",fontSize:12,cursor:busy?"not-allowed":"pointer"}}>Extend ({MAX_EXT-(permit.extensions||0)} left)</button>}
              <button onClick={()=>action("suspend")} disabled={busy} style={{flex:1,border:`0.5px solid ${B.danger}`,background:B.dangerLight,color:B.danger,borderRadius:8,padding:"10px",fontSize:12,cursor:busy?"not-allowed":"pointer"}}>Suspend</button>
              <button onClick={()=>action("close")} disabled={busy} style={{flex:1,border:`0.5px solid ${B.accentBorder}`,background:B.accentLight,color:B.accentBorder,borderRadius:8,padding:"10px",fontSize:12,cursor:busy?"not-allowed":"pointer"}}>Close</button>
            </div>
          )}
          {permit.status==="extension_pending"&&(
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>action("ext_approve")} disabled={busy} style={{flex:1,background:busy?"#999":B.accent,color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:12,fontWeight:600,cursor:busy?"not-allowed":"pointer"}}>Approve extension</button>
              <button onClick={()=>action("ext_reject")} disabled={busy} style={{flex:1,border:`0.5px solid ${B.danger}`,background:B.dangerLight,color:B.danger,borderRadius:8,padding:"10px",fontSize:12,cursor:busy?"not-allowed":"pointer"}}>Reject</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── New Permit ────────────────────────────────────────────────────
// FIX: sends "submitted" notification to all org members on creation
function NewPermit({ session, onBack, onSuccess }) {
  const [type, setType]           = useState("");
  const [title, setTitle]         = useState("");
  const [area, setArea]           = useState("");
  const [requester, setRequester] = useState(session.profile.full_name);
  const [supervisor, setSupervisor] = useState("");
  const [busy, setBusy]           = useState(false);
  const [err, setErr]             = useState("");

  async function submit() {
    if (!type||!title||!area||!requester||!supervisor) { setErr("Please fill all required fields."); return; }
    setBusy(true); setErr("");
    const num = "PTW-"+new Date().getFullYear()+"-"+String(Date.now()).slice(-4);
    const res = await sb.insert(session.token,"permits",{
      org_id:          session.profile.org_id,
      permit_number:   num,
      type,title,area,
      requester_name:  requester,
      supervisor_name: supervisor,
      status:          "pending",
      stage:           1,
      priority:        "medium",
      extensions:      0,
    });
    if (res&&res[0]&&!res.error) {
      await sb.insert(session.token,"permit_audit",{
        org_id:    session.profile.org_id,
        permit_id: res[0].id,
        user_id:   session.userId,
        user_name: session.profile.full_name,
        user_role: roleLabel(session.profile.role),
        action:    "Permit submitted",
        note:      "",
      });
      // FIX: notify all org members of the new submission
      await sb.notify(
        session.token,
        session.profile.org_id,
        res[0].id,
        num,
        title,
        "submitted",
        session.profile.full_name
      );
      onSuccess();
    } else {
      setErr("Failed to create permit. Please try again.");
    }
    setBusy(false);
  }

  return (
    <div>
      <Topbar title="New Permit Request" onBack={onBack}/>
      <div style={{padding:"1.25rem"}}>
        {err&&<Err msg={err}/>}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div>
            <label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Permit type *</label>
            <select value={type} onChange={e=>setType(e.target.value)}>
              <option value="">Select permit type…</option>
              {PERMIT_TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Work title *</label>
            <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Brief description of work"/>
          </div>
          <div>
            <label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Work area / location *</label>
            <input value={area} onChange={e=>setArea(e.target.value)} placeholder="e.g. Zone A - Process Unit"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div>
              <label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Team leader *</label>
              <input value={requester} onChange={e=>setRequester(e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Supervisor *</label>
              <input value={supervisor} onChange={e=>setSupervisor(e.target.value)} placeholder="Supervisor name"/>
            </div>
          </div>
        </div>
        <button onClick={submit} disabled={busy} style={{marginTop:"1.5rem",width:"100%",background:busy?"#999":B.primary,color:"#fff",border:"none",borderRadius:8,padding:"12px",fontSize:13,fontWeight:700,cursor:busy?"not-allowed":"pointer"}}>
          {busy?"Submitting…":"Submit permit request"}
        </button>
      </div>
    </div>
  );
}

// ── Notifications ─────────────────────────────────────────────────
// FIX: reads from the `notifications` DB table (persistent, cross-user)
//      instead of deriving state client-side from permits array.
function Notifs({ session, onBack, onSelectPermit, onUnreadChange }) {
  const [notes, setNotes]   = useState([]);
  const [loading, setLoading] = useState(true);

  async function loadNotifs() {
    setLoading(true);
    const data = await sb.select(
      session.token,
      "notifications",
      `user_id=eq.${session.userId}&order=created_at.desc&limit=80`
    );
    if (Array.isArray(data)) {
      setNotes(data);
      const unread = data.filter(n=>!n.is_read).length;
      if (onUnreadChange) onUnreadChange(unread);
    }
    setLoading(false);
  }

  useEffect(()=>{ loadNotifs(); },[]);

  async function markAllRead() {
    await sb.update(
      session.token, "notifications",
      `user_id=eq.${session.userId}&is_read=eq.false`,
      { is_read: true }
    );
    setNotes(prev=>prev.map(n=>({...n,is_read:true})));
    if (onUnreadChange) onUnreadChange(0);
  }

  async function markRead(notif) {
    if (!notif.is_read) {
      await sb.update(
        session.token, "notifications",
        `id=eq.${notif.id}`,
        { is_read: true }
      );
      setNotes(prev=>prev.map(n=>n.id===notif.id?{...n,is_read:true}:n));
      const remaining = notes.filter(n=>!n.is_read&&n.id!==notif.id).length;
      if (onUnreadChange) onUnreadChange(remaining);
    }
    // Navigate to the permit if we have permit_id
    if (notif.permit_id) {
      const permits = await sb.select(session.token,"permits",`id=eq.${notif.permit_id}`);
      if (Array.isArray(permits)&&permits[0]) onSelectPermit(permits[0]);
    }
  }

  const unread = notes.filter(n=>!n.is_read).length;

  // Map event_type to icon
  const icons = { submitted:"📋", aa_approved:"✓", osh_approved:"✓", issued:"🟢", rejected:"✗", suspended:"⚠", closed:"🔒", ext_requested:"⟳", ext_approved:"✓", ext_rejected:"✗" };

  return (
    <div>
      <Topbar title="Notifications" onBack={onBack} right={
        unread>0
          ? <button onClick={markAllRead} style={{border:"0.5px solid rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.1)",color:"#fff",borderRadius:6,padding:"6px 12px",fontSize:11,cursor:"pointer"}}>Mark all read</button>
          : null
      }/>
      <div style={{padding:"1.25rem"}}>
        {loading&&<Spinner/>}
        {!loading&&notes.length===0&&(
          <div style={{textAlign:"center",padding:"3rem 1rem"}}>
            <p style={{fontSize:32}}>✓</p>
            <p style={{fontSize:14,fontWeight:600,color:B.text,marginTop:8}}>All clear</p>
            <p style={{fontSize:13,color:B.textSub}}>No notifications yet.</p>
          </div>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {notes.map(n=>{
            const isRead = n.is_read;
            const icon = icons[n.event_type]||"🔔";
            return (
              <div key={n.id} onClick={()=>markRead(n)}
                style={{background:isRead?"#fff":B.accentLight,border:`0.5px solid ${isRead?B.neutralBorder:B.accent}`,borderLeft:`3px solid ${isRead?B.neutralBorder:B.accent}`,borderRadius:10,padding:"12px 14px",cursor:"pointer",opacity:isRead?0.7:1}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{width:30,height:30,borderRadius:"50%",background:B.neutral,border:`0.5px solid ${B.neutralBorder}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{icon}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                      <p style={{fontSize:12,fontWeight:isRead?500:700,color:isRead?B.textSub:B.text,flex:1}}>{n.message}</p>
                      <p style={{fontSize:10,color:B.textSub,whiteSpace:"nowrap"}}>{n.created_at?new Date(n.created_at).toLocaleString():""}</p>
                    </div>
                    <p style={{fontSize:11,color:B.accentBorder,marginTop:2}}>{n.reference} {n.title?"· "+n.title:""}</p>
                    {!isRead&&<span style={{fontSize:10,background:B.accent,color:"#fff",borderRadius:20,padding:"1px 8px",marginTop:4,display:"inline-block"}}>New</span>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Admin Panel ───────────────────────────────────────────────────
function Admin({ session, onBack }) {
  const [users, setUsers]           = useState([]);
  const [loading, setLoading]       = useState(true);
  const [showForm, setShowForm]     = useState(false);
  const [inviteName, setInviteName] = useState("");
  const [inviteEmail, setInviteEmail] = useState("");
  const [inviteRole, setInviteRole] = useState("requester");
  const [invitePass, setInvitePass] = useState("Controlit@2024!");
  const [busy, setBusy]             = useState(false);
  const [result, setResult]         = useState(null);
  const [err, setErr]               = useState("");

  function loadUsers() {
    setLoading(true);
    sb.select(session.token,"profiles","org_id=eq."+session.profile.org_id+"&order=full_name.asc")
      .then(d=>{ if(Array.isArray(d)) setUsers(d); setLoading(false); });
  }

  useEffect(()=>{ loadUsers(); },[]);

  async function sendInvite() {
    if (!inviteName||!inviteEmail) { setErr("Name and email are required."); return; }
    setBusy(true); setErr(""); setResult(null);
    try {
      const authUser = await sb.createUser(inviteEmail, invitePass);
      if (!authUser.id) { setErr("Failed to create user: "+(authUser.message||"Unknown error")); setBusy(false); return; }
      await sb.insert(session.token,"profiles",{ id:authUser.id, org_id:session.profile.org_id, full_name:inviteName, email:inviteEmail, role:inviteRole, active:true });
      setResult({name:inviteName,email:inviteEmail,pass:invitePass,role:inviteRole});
      setInviteName(""); setInviteEmail(""); setInvitePass("Controlit@2024!"); setInviteRole("requester");
      loadUsers();
    } catch(e) { setErr("Error: "+e.message); }
    setBusy(false);
  }

  async function updateRole(userId, newRole) {
    await sb.update(session.token,"profiles",`id=eq.${userId}`,{role:newRole});
    setUsers(prev=>prev.map(u=>u.id===userId?{...u,role:newRole}:u));
  }

  async function toggleUserActive(user) {
    const newActive = !user.active;
    await sb.update(session.token,"profiles",`id=eq.${user.id}`,{active:newActive});
    setUsers(prev=>prev.map(u=>u.id===user.id?{...u,active:newActive}:u));
  }

  return (
    <div>
      <Topbar title="Admin Panel" onBack={onBack}/>
      <div style={{padding:"1.25rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
          <p style={{fontSize:13,fontWeight:600,color:B.text}}>Team members ({users.length})</p>
          <button onClick={()=>{setShowForm(!showForm); setResult(null); setErr("");}} style={{background:B.accent,color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
            {showForm?"Cancel":"+ Invite member"}
          </button>
        </div>

        {showForm&&(
          <div style={{background:B.neutral,border:`0.5px solid ${B.neutralBorder}`,borderRadius:12,padding:"1rem 1.25rem",marginBottom:"1rem"}}>
            <p style={{fontSize:13,fontWeight:600,color:B.text,marginBottom:"1rem"}}>New team member</p>
            {err&&<div style={{background:B.dangerLight,border:`0.5px solid ${B.danger}`,borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:12,color:B.danger}}>{err}</div>}
            {result&&(
              <div style={{background:B.accentLight,border:`0.5px solid ${B.accent}`,borderRadius:10,padding:"1rem",marginBottom:"1rem"}}>
                <p style={{fontSize:12,fontWeight:700,color:B.accentBorder,marginBottom:8}}>✓ {result.name} added successfully</p>
                <div style={{background:"#fff",borderRadius:8,padding:"10px 12px",fontSize:12,fontFamily:"monospace",color:B.text,lineHeight:2}}>
                  <div>URL: <span style={{color:B.accentBorder}}>https://getcontrolit.com/app.html</span></div>
                  <div>Email: <span style={{color:B.accentBorder}}>{result.email}</span></div>
                  <div>Password: <span style={{color:B.accentBorder}}>{result.pass}</span></div>
                  <div>Role: <span style={{color:B.accentBorder}}>{roleLabel(result.role)}</span></div>
                </div>
                <button onClick={()=>setResult(null)} style={{marginTop:10,background:"transparent",border:`0.5px solid ${B.neutralBorder}`,borderRadius:6,padding:"6px 12px",fontSize:12,cursor:"pointer",color:B.textSub}}>Invite another</button>
              </div>
            )}
            {!result&&(
              <>
                <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:12}}>
                  <div>
                    <label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Full name *</label>
                    <input value={inviteName} onChange={e=>setInviteName(e.target.value)} placeholder="e.g. John Adeyemi"/>
                  </div>
                  <div>
                    <label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Email address *</label>
                    <input value={inviteEmail} onChange={e=>setInviteEmail(e.target.value)} placeholder="john@company.com" type="email"/>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <div>
                      <label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Role *</label>
                      <select value={inviteRole} onChange={e=>setInviteRole(e.target.value)}>
                        {ROLES.map(r=><option key={r} value={r}>{roleLabel(r)}</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Temp password</label>
                      <input value={invitePass} onChange={e=>setInvitePass(e.target.value)}/>
                    </div>
                  </div>
                </div>
                <button onClick={sendInvite} disabled={busy} style={{width:"100%",background:busy?"#999":B.accent,color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:600,cursor:busy?"not-allowed":"pointer"}}>
                  {busy?"Creating account…":"Create account & invite"}
                </button>
              </>
            )}
          </div>
        )}

        {loading&&<Spinner/>}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {!loading&&users.length===0&&<p style={{fontSize:13,color:B.textSub}}>No team members yet.</p>}
          {users.map(u=>(
            <div key={u.id} style={{background:"#fff",border:`0.5px solid ${B.neutralBorder}`,borderRadius:10,padding:"12px 14px",opacity:u.active?1:0.6}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:u.id!==session.userId?10:0}}>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:B.accentLight,border:`0.5px solid ${B.accent}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:B.accentBorder,flexShrink:0}}>
                    {u.full_name.split(" ").map(n=>n[0]).join("").slice(0,2)}
                  </div>
                  <div>
                    <p style={{fontSize:13,fontWeight:600,color:B.text}}>{u.full_name}</p>
                    <p style={{fontSize:11,color:B.textSub}}>{u.email}</p>
                    <p style={{fontSize:11,color:B.textSub,textTransform:"capitalize"}}>{roleLabel(u.role)}</p>
                  </div>
                </div>
                <span style={{background:u.active?B.accentLight:B.neutral,color:u.active?B.accentBorder:B.textSub,border:`0.5px solid ${u.active?B.accent:B.neutralBorder}`,borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:600}}>
                  {u.active?"Active":"Suspended"}
                </span>
              </div>
              {u.id!==session.userId&&(
                <div style={{display:"flex",gap:8,alignItems:"center",paddingTop:8,borderTop:`0.5px solid ${B.neutralBorder}`}}>
                  <select value={u.role} onChange={e=>updateRole(u.id,e.target.value)} style={{fontSize:11,padding:"4px 8px",flex:1,borderRadius:6,height:30}}>
                    {ROLES.map(r=><option key={r} value={r}>{roleLabel(r)}</option>)}
                  </select>
                  <button onClick={()=>toggleUserActive(u)} style={{background:u.active?B.warnLight:B.accentLight,color:u.active?B.warn:B.accentBorder,border:`0.5px solid ${u.active?B.warn:B.accent}`,borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>
                    {u.active?"Suspend":"Reactivate"}
                  </button>
                </div>
              )}
              {u.id===session.userId&&<p style={{fontSize:11,color:B.textSub,marginTop:4}}>This is your account</p>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── App Root ──────────────────────────────────────────────────────
// FIX: unread count now driven from notifications DB, passed down to Notifs
function App() {
  const [session, setSession]     = useState(null);
  const [screen, setScreen]       = useState("dashboard");
  const [permits, setPermits]     = useState([]);
  const [selected, setSelected]   = useState(null);
  const [loading, setLoading]     = useState(false);
  const [error, setError]         = useState("");
  const [setupDone, setSetupDone] = useState(false);
  // FIX: unread driven from DB notification count, not from permits array
  const [unread, setUnread]       = useState(0);

  const fetchPermits = useCallback(async () => {
    if (!session) return;
    setLoading(true); setError("");
    try {
      const d = await sb.select(session.token,"permits","order=created_at.desc");
      if (Array.isArray(d)) setPermits(d);
      else setError("Failed to load permits.");
    } catch(e) { setError("Connection error."); }
    setLoading(false);
  },[session]);

  // FIX: load unread count from notifications table on mount and after actions
  const fetchUnread = useCallback(async () => {
    if (!session) return;
    try {
      const data = await sb.select(
        session.token, "notifications",
        `user_id=eq.${session.userId}&is_read=eq.false&select=id`
      );
      if (Array.isArray(data)) setUnread(data.length);
    } catch(e) {}
  },[session]);

  useEffect(()=>{ fetchPermits(); },[fetchPermits]);
  useEffect(()=>{ fetchUnread(); },[fetchUnread]);

  if (!session) return <Login onLogin={s=>setSession(s)}/>;
  if (session.firstTime&&!setupDone) return <AccountSetup session={session} onComplete={s=>{setSession(s); setSetupDone(true);}}/>;

  async function logout() {
    await sb.signOut(session.token);
    setSession(null); setPermits([]); setScreen("dashboard"); setSetupDone(false);
  }

  function selectPermit(p) { setSelected(p); setScreen("detail"); }

  return (
    <div>
      {screen==="dashboard"&&<Dashboard session={session} permits={permits} loading={loading} error={error} onSelect={selectPermit} onNew={()=>setScreen("new")} onNotifs={()=>setScreen("notifs")} unread={unread} onAdmin={()=>setScreen("admin")} onWorkflow={()=>setScreen("workflow")} onChangePass={()=>setScreen("changepass")} onLogout={logout}/>}
      {screen==="detail"&&selected&&<PermitDetail permit={selected} session={session} onBack={()=>{fetchPermits(); fetchUnread(); setScreen("dashboard");}} onRefresh={async()=>{await fetchPermits(); await fetchUnread();}}/>}
      {screen==="new"&&<NewPermit session={session} onBack={()=>setScreen("dashboard")} onSuccess={()=>{fetchPermits(); fetchUnread(); setScreen("dashboard");}}/>}
      {screen==="notifs"&&<Notifs session={session} onBack={()=>{fetchUnread(); setScreen("dashboard");}} onSelectPermit={p=>{setSelected(p); setScreen("detail");}} onUnreadChange={setUnread}/>}
      {screen==="admin"&&<Admin session={session} onBack={()=>setScreen("dashboard")}/>}
      {screen==="changepass"&&<ChangePassword session={session} onBack={()=>setScreen("dashboard")}/>}
      {screen==="workflow"&&(
        <div>
          <Topbar title="Permit Workflow" onBack={()=>setScreen("dashboard")}/>
          <div style={{padding:"1.25rem"}}>
            {STAGES.map((s,i)=>(
              <div key={s} style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:16}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:B.primary,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,flexShrink:0}}>{i+1}</div>
                <div style={{background:B.neutral,borderRadius:8,padding:"10px 14px",flex:1}}>
                  <p style={{fontSize:13,fontWeight:600,color:B.text}}>{s}</p>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
