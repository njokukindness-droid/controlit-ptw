// ── Login ─────────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const[email,setEmail]=useState("");const[pass,setPass]=useState("");const[busy,setBusy]=useState(false);const[err,setErr]=useState("");
  const tap=useOwnerTap();
  async function go(){
    if(!email||!pass)return;setBusy(true);setErr("");
    try{
      const d=await sb.signIn(email,pass);if(d.error){setErr(d.error.message||"Login failed.");setBusy(false);return;}
      const token=d.access_token,uid=d.user?.id;
      const profiles=await sb.select(token,"profiles",`id=eq.${uid}`);
      if(!profiles||!profiles[0]){setErr("No profile found. Contact your administrator.");setBusy(false);return;}
      const profile=profiles[0];
      const orgs=await sb.select(token,"organisations",`id=eq.${profile.org_id}`);
      const org=orgs&&orgs[0]?orgs[0]:{name:"Your Organisation"};
      if(org&&org.active===false){setErr("Organisation suspended. Contact support.");setBusy(false);return;}
      onLogin({token,userId:uid,profile,org,apiKey:decodeApiKey(org.anthropic_key)});
    }catch(e){setErr("Connection error.");}
    setBusy(false);
  }
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F2640 0%,#1A3A5C 60%,#0E4D38 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem"}}>

        <svg width="60" height="60" viewBox="0 0 32 32" fill="none" onClick={tap} style={{marginBottom:12,cursor:"default"}}><rect width="32" height="32" rx="8" fill={B.accent}/><path d="M8 16 L14 22 L24 10" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/><circle cx="16" cy="16" r="10" stroke="#fff" strokeWidth="1.5" fill="none" opacity="0.4"/></svg>
        <div style={{color:B.white,fontWeight:800,fontSize:30,letterSpacing:"0.06em"}}>CONTROLIT</div>
        <div style={{color:"rgba(255,255,255,0.55)",fontSize:13,marginTop:4}}>Permit to Work Management Platform</div>
      </div>
      <div style={{background:"rgba(255,255,255,0.07)",backdropFilter:"blur(12px)",border:"0.5px solid rgba(255,255,255,0.15)",borderRadius:16,padding:"2rem",width:"100%",maxWidth:360}}>
        <p style={{color:"rgba(255,255,255,0.8)",fontSize:13,marginBottom:"1.25rem",fontWeight:500}}>Sign in to your account</p>
        {err&&<div style={{background:"rgba(192,57,43,0.2)",border:"0.5px solid rgba(192,57,43,0.5)",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#ffaaaa"}}>{err}</div>}
        <div style={{marginBottom:12}}><label style={{fontSize:11,color:"rgba(255,255,255,0.55)",display:"block",marginBottom:4}}>Email</label><input value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="you@company.com" style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:B.white,borderRadius:8}}/></div>
        <div style={{marginBottom:"1.5rem"}}><label style={{fontSize:11,color:"rgba(255,255,255,0.55)",display:"block",marginBottom:4}}>Password</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="••••••••" style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:B.white,borderRadius:8}}/></div>
        <button onClick={go} disabled={busy} style={{width:"100%",background:busy?"#555":B.accent,color:B.white,border:"none",borderRadius:8,padding:"12px",fontSize:14,fontWeight:700,cursor:busy?"not-allowed":"pointer"}}>{busy?"Signing in…":"Sign in"}</button>
        <p style={{textAlign:"center",color:"rgba(255,255,255,0.3)",fontSize:11,marginTop:"1rem"}}>Access by invitation only · CONTROLIT v1.0</p>
      </div>
    </div>
  );
}

// ── Account Setup ─────────────────────────────────────────────────────────────
function AccountSetup({session,onComplete}){
  const[fullName,setFullName]=useState(session.profile.full_name||"");const[newPass,setNewPass]=useState("");const[confirm,setConfirm]=useState("");const[busy,setBusy]=useState(false);const[err,setErr]=useState("");
  async function save(){
    if(!fullName.trim()){setErr("Enter your full name.");return;}if(newPass.length<8){setErr("Password min 8 chars.");return;}if(newPass!==confirm){setErr("Passwords do not match.");return;}
    setBusy(true);setErr("");const r=await sb.updatePassword(session.token,newPass);if(r.error){setErr(r.error.message||"Failed.");setBusy(false);return;}
    await sb.update(session.token,"profiles",`id=eq.${session.userId}`,{full_name:fullName});onComplete({...session,profile:{...session.profile,full_name:fullName}});setBusy(false);
  }
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F2640 0%,#1A3A5C 60%,#0E4D38 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem"}}>
      <div style={{marginBottom:"2rem",textAlign:"center"}}><svg width="56" height="56" viewBox="0 0 32 32" fill="none" style={{marginBottom:12}}><rect width="32" height="32" rx="8" fill={B.accent}/><path d="M8 16 L14 22 L24 10" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/><circle cx="16" cy="16" r="10" stroke="#fff" strokeWidth="1.5" fill="none" opacity="0.4"/></svg><div style={{color:B.white,fontWeight:800,fontSize:26,letterSpacing:"0.06em"}}>CONTROLIT</div><div style={{color:"rgba(255,255,255,0.55)",fontSize:13,marginTop:4}}>Complete account setup</div></div>
      <div style={{background:"rgba(255,255,255,0.07)",backdropFilter:"blur(12px)",border:"0.5px solid rgba(255,255,255,0.15)",borderRadius:16,padding:"2rem",width:"100%",maxWidth:380}}>
        <p style={{color:"rgba(255,255,255,0.8)",fontSize:13,marginBottom:"1.25rem",fontWeight:500}}>Welcome to <strong style={{color:B.accent}}>{session.org.name}</strong>. Set your name and a secure password.</p>
        {err&&<div style={{background:"rgba(192,57,43,0.2)",border:"0.5px solid rgba(192,57,43,0.5)",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#ffaaaa"}}>{err}</div>}
        <div style={{marginBottom:12}}><label style={{fontSize:11,color:"rgba(255,255,255,0.55)",display:"block",marginBottom:4}}>Full name *</label><input value={fullName} onChange={e=>setFullName(e.target.value)} style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:B.white,borderRadius:8}}/></div>
        <div style={{marginBottom:12}}><label style={{fontSize:11,color:"rgba(255,255,255,0.55)",display:"block",marginBottom:4}}>New password *</label><input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:B.white,borderRadius:8}}/></div>
        <div style={{marginBottom:"1.5rem"}}><label style={{fontSize:11,color:"rgba(255,255,255,0.55)",display:"block",marginBottom:4}}>Confirm password *</label><input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:B.white,borderRadius:8}}/></div>
        <button onClick={save} disabled={busy} style={{width:"100%",background:busy?"#555":B.accent,color:B.white,border:"none",borderRadius:8,padding:"12px",fontSize:14,fontWeight:700,cursor:busy?"not-allowed":"pointer"}}>{busy?"Saving…":"Complete setup & sign in"}</button>
      </div>
    </div>
  );
}

// ── Change Password ───────────────────────────────────────────────────────────
function ChangePassword({session,onBack}){
  const[c,setC]=useState("");const[n,setN]=useState("");const[cn,setCn]=useState("");const[busy,setBusy]=useState(false);const[err,setErr]=useState("");const[ok,setOk]=useState(false);
  async function save(){
    if(!c){setErr("Enter current password.");return;}if(n.length<8){setErr("Min 8 chars.");return;}if(n!==cn){setErr("Passwords do not match.");return;}if(n===c){setErr("Must differ from current.");return;}
    setBusy(true);setErr("");const chk=await sb.signIn(session.profile.email,c);if(chk.error){setErr("Current password incorrect.");setBusy(false);return;}
    const r=await sb.updatePassword(session.token,n);if(r.error){setErr(r.error.message||"Failed.");setBusy(false);return;}setOk(true);setBusy(false);
  }

// ── New Permit ────────────────────────────────────────────────────────────────
function NewPermit({session,onBack,onSuccess}){
  const[type,setType]=useState("");const[title,setTitle]=useState("");const[area,setArea]=useState("");const[requester,setRequester]=useState(session.profile.full_name);const[supervisor,setSupervisor]=useState("");const[tools,setTools]=useState("");const[controls,setControls]=useState({});const[raMode,setRaMode]=useState(null);const[raFile,setRaFile]=useState(null);const[raFileData,setRaFileData]=useState(null);const[raGenerated,setRaGenerated]=useState("");const[raGenerating,setRaGenerating]=useState(false);const[busy,setBusy]=useState(false);const[err,setErr]=useState("");
  const typeControls=type?(PERMIT_CONTROLS[type]||[]):[];
  const isRARequired=controls["RA Required"];

  function handleFile(e){const f=e.target.files?.[0];if(!f)return;setRaFile(f);const rd=new FileReader();rd.onload=ev=>setRaFileData(ev.target.result);rd.readAsDataURL(f);}

  async function generateRA(){
    if(!session.apiKey){setErr("AI features not configured. Contact your administrator.");return;}
    setRaGenerating(true);setErr("");
    const sel=typeControls.filter(c=>controls[c]&&c!=="RA Required");
    try{const text=await callClaude(session.apiKey,"You are a senior HSE risk assessment specialist. Generate a formal 5x5 risk matrix risk assessment in clean HTML (no markdown, no code fences). Include: 1) A titled 5x5 risk matrix table (Likelihood 1-5 vs Severity 1-5) with color-coded cells (green/yellow/orange/red). 2) A Hazard Register table: Hazard | Likelihood | Severity | Risk Rating | Control Measures. 3) A Signatories section with blanks. Use inline CSS for all styling.",`Permit Type: ${pt(type).label}\nWork Title: ${title}\nWork Area: ${area}\nSelected Controls: ${sel.join(", ")}\nTeam Leader: ${requester}\nSupervisor: ${supervisor}`);setRaGenerated(text);}catch(e){setErr("AI error: "+e.message);}
    setRaGenerating(false);
  }

  async function submit(){
    if(!type||!title||!area||!requester||!supervisor){setErr("Fill all required fields.");return;}

    if(isRARequired){if(!raMode){setErr("RA Required is checked — upload or generate a risk assessment.");return;}if(raMode==="upload"&&!raFileData){setErr("Upload the RA document.");return;}if(raMode==="generate"&&!raGenerated){setErr("Generate the RA first.");return;}}

    const res=await sb.insert(session.token,"permits",{org_id:session.profile.org_id,permit_number:num,type,title,area,requester_name:requester,supervisor_name:supervisor,status:"pending",stage:1,priority:"medium",extensions:0,form_data:fd});

          <div><label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Work title *</label><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Brief description of work to be performed"/></div>
          <div><label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Work area / location *</label><input value={area} onChange={e=>setArea(e.target.value)} placeholder="e.g. Zone A — Process Unit 3"/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Team leader *</label><input value={requester} onChange={e=>setRequester(e.target.value)}/></div>

          </div>
        </div>
      </Card>

      <Card title="Tools & Equipment">
        <textarea value={tools} onChange={e=>setTools(e.target.value)} placeholder={"List all tools and equipment:\ne.g. Angle grinder (inspected), welding machine, 2T lifting slings…"} rows={4} style={{resize:"vertical"}}/>
        <p style={{fontSize:11,color:B.textSub,marginTop:6}}>Include make/model. Confirm each item inspected before work.</p>
      </Card>

      {type&&(
        <Card title="Control Measures" accent={B.accent}>
          <p style={{fontSize:11,color:B.textSub,marginBottom:10}}>Select all controls in place. These become the Issuer's site verification checklist.</p>
          {typeControls.map(ctrl=>{
            const isRA=ctrl==="RA Required";
            return(

                <label style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 0",borderBottom:`0.5px solid ${B.neutralBorder}`,cursor:"pointer"}}>
                  <input type="checkbox" checked={!!controls[ctrl]} onChange={e=>setControls(prev=>({...prev,[ctrl]:e.target.checked}))} style={{width:"auto",marginTop:2,accentColor:B.accent}}/>
                  <span style={{fontSize:13,color:isRA?B.accentBorder:B.text,fontWeight:isRA?700:400,lineHeight:1.5}}>{ctrl}</span>
                </label>
                {isRA&&controls[ctrl]&&(
                  <div style={{background:B.accentLight,border:`0.5px solid ${B.accent}`,borderRadius:8,padding:"1rem",margin:"6px 0 2px"}}>
                    <p style={{fontSize:12,fontWeight:700,color:B.accentBorder,marginBottom:10}}>Risk Assessment — choose option:</p>
                    <div style={{display:"flex",gap:8,marginBottom:12}}>

                      <button onClick={()=>setRaMode("generate")} style={{flex:1,background:raMode==="generate"?B.accent:"transparent",color:raMode==="generate"?"#fff":B.accentBorder,border:`0.5px solid ${B.accent}`,borderRadius:8,padding:"8px",fontSize:12,fontWeight:600,cursor:"pointer"}}>🤖 Generate with AI</button>
                    </div>
                    {raMode==="upload"&&(<div><input type="file" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" onChange={handleFile} style={{fontSize:12}}/>{raFile&&<p style={{fontSize:11,color:B.accentBorder,marginTop:6}}>✓ {raFile.name} attached</p>}</div>)}
                    {raMode==="generate"&&(<div>
                      {!session.apiKey&&<p style={{fontSize:12,color:B.warn,padding:"8px",background:B.warnLight,borderRadius:6}}>⚠ AI not configured for this organisation.</p>}
                      {session.apiKey&&!raGenerated&&<button onClick={generateRA} disabled={raGenerating||!title} style={{width:"100%",background:raGenerating?"#999":B.primary,color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:12,fontWeight:600,cursor:raGenerating?"not-allowed":"pointer"}}>{raGenerating?"🤖 Generating…":"Generate 5×5 Risk Assessment"}</button>}
                      {raGenerated&&(<div><div style={{background:"#fff",borderRadius:8,padding:"10px",fontSize:11,maxHeight:220,overflowY:"auto",border:`0.5px solid ${B.neutralBorder}`}} dangerouslySetInnerHTML={{__html:raGenerated}}/><div style={{display:"flex",gap:8,marginTop:8}}><button onClick={()=>setRaGenerated("")} style={{flex:1,background:"transparent",border:`0.5px solid ${B.neutralBorder}`,borderRadius:6,padding:"5px",fontSize:11,cursor:"pointer",color:B.textSub}}>Regenerate</button><span style={{display:"flex",alignItems:"center",fontSize:11,color:B.accentBorder,fontWeight:600}}>✓ RA ready</span></div></div>)}
                    </div>)}
                  </div>
                )}
              </div>
            );
          })}
        </Card>
      )}
      <button onClick={submit} disabled={busy||!type} style={{width:"100%",background:(busy||!type)?"#999":B.primary,color:"#fff",border:"none",borderRadius:8,padding:"12px",fontSize:13,fontWeight:700,cursor:(busy||!type)?"not-allowed":"pointer"}}>{busy?"Submitting…":"Submit permit request"}</button>
    </div></div>
  );
}

// ── Permit Detail ─────────────────────────────────────────────────────────────
function PermitDetail({permit:init,session,onBack,onRefresh}){
  const[tab,setTab]=useState("detail");const[audit,setAudit]=useState([]);const[permit,setPermit]=useState(init);const[busy,setBusy]=useState(false);const[errMsg,setErrMsg]=useState("");const[rejectReason,setRejectReason]=useState("");const[showRejectBox,setShowRejectBox]=useState(false);const[oshControls,setOshControls]=useState((init.form_data?.osh_additional_controls)||"");const[aiSuggesting,setAiSuggesting]=useState(false);const[checklistDone,setChecklistDone]=useState({});const[showChecklist,setShowChecklist]=useState(false);const[showPDF,setShowPDF]=useState(false);
  const t=pt(permit.type);const fd=permit.form_data||{};
  function loadAudit(){sb.select(session.token,"permit_audit",`permit_id=eq.${permit.id}&order=created_at.asc`).then(d=>{if(Array.isArray(d))setAudit(d);});}
  useEffect(()=>{loadAudit();},[permit.id]);

  const checklistItems=[...(fd.selected_controls||[]).filter(c=>c!=="RA Required"),...(fd.osh_additional_controls?fd.osh_additional_controls.split("\n").filter(s=>s.trim()):[])];
  const allChecked=checklistItems.length>0&&checklistItems.every(c=>checklistDone[c]);
  const isOSH=(session.profile.role==="safety_officer"||session.profile.role==="admin")&&permit.stage===3&&permit.status==="pending";
  const isIssuer=(session.profile.role==="issuer"||session.profile.role==="admin")&&permit.stage===4&&permit.status==="pending";

  async function getAI(){
    if(!session.apiKey){setErrMsg("AI not configured.");return;}setAiSuggesting(true);setErrMsg("");
    try{const sel=(fd.selected_controls||[]).filter(c=>c!=="RA Required");const text=await callClaude(session.apiKey,"You are a senior HSE safety officer. Recommend additional control measures as a numbered list, one per line. Specific to the permit type and work described. No preamble, no markdown, just the numbered list.",`Permit Type: ${t.label}\nWork: ${permit.title}\nArea: ${permit.area}\nExisting controls:\n${sel.join("\n")}\n\nRecommend 5-8 additional specific controls.`);setOshControls(prev=>(prev?prev+"\n":"")+text.trim());}catch(e){setErrMsg("AI error: "+e.message);}
    setAiSuggesting(false);
  }

  async function action(act){
    setErrMsg("");const role=session.profile.role;
    if(act==="approve"&&role!=="admin"){const exp=ROLE_STAGE[role];if(exp===undefined){setErrMsg("Your role is not in the approval chain.");return;}if(permit.stage!==exp){setErrMsg(`This permit is at stage ${permit.stage} and is not yet ready for your approval.`);return;}}
    if(act==="issue"&&role!=="issuer"&&role!=="admin"){setErrMsg("Only the Issuer can issue a permit.");return;}
    if(act==="issue"&&!allChecked){setErrMsg("Complete all checklist items before issuing.");return;}
    if(act==="reject"&&!rejectReason.trim()){setErrMsg("Provide a rejection reason.");return;}
    setBusy(true);
    let ns=permit.status,st=permit.stage,ex=permit.extensions||0;const extra={};
    if(act==="approve"){if(role==="safety_officer"||permit.stage===3)extra.form_data={...fd,osh_additional_controls:oshControls,checklist_generated:true};st=Math.min(permit.stage+1,4);ns=st>=4?"active":"pending";}
    else if(act==="issue"){st=4;ns="active";extra.issued_by=session.userId;extra.issued_at=nowStr();extra.form_data={...fd,issuer_checklist:checklistDone,issued_by_name:session.profile.full_name};}
    else if(act==="reject"){ns="rejected";extra.form_data={...fd,rejection_reason:rejectReason,rejected_by:session.profile.full_name,rejected_at:nowStr()};}
    else if(act==="suspend")ns="revoked";
    else if(act==="close"){ns="closed";extra.closed_at=nowStr();}
    else if(act==="ext_request")ns="extension_pending";
    else if(act==="ext_approve"){ns="active";ex=(permit.extensions||0)+1;}
    else if(act==="ext_reject")ns="active";
    const labels={approve:"Approved & forwarded",issue:"Permit issued",reject:"Rejected",suspend:"Permit suspended",close:"Permit closed",ext_request:"Extension requested",ext_approve:"Extension approved",ext_reject:"Extension rejected"};
    const nevt={approve:permit.stage===3?"osh_approved":"aa_approved",issue:"issued",reject:"rejected",suspend:"suspended",close:"closed",ext_request:"ext_requested",ext_approve:"ext_approved",ext_reject:"ext_rejected"};
    await sb.update(session.token,"permits",`id=eq.${permit.id}`,{status:ns,stage:st,extensions:ex,...extra});
    await sb.insert(session.token,"permit_audit",{org_id:session.profile.org_id,permit_id:permit.id,user_id:session.userId,user_name:session.profile.full_name,user_role:roleLabel(role),action:labels[act]||act,note:rejectReason||""});
    await sb.notify(session.token,session.profile.org_id,permit.id,permit.permit_number,permit.title,nevt[act]||act,session.profile.full_name);
    setPermit({...permit,status:ns,stage:st,extensions:ex,...extra});setRejectReason("");setShowRejectBox(false);loadAudit();await onRefresh();setBusy(false);
  }

  const canExtend=permit.status==="active"&&(permit.extensions||0)<MAX_EXT;

  return(
    <div><Topbar title={permit.permit_number} onBack={onBack}/>
    <div style={{padding:"1.25rem"}}>
      {errMsg&&<ErrBox msg={errMsg}/>}
      <div style={{background:B.neutral,border:`0.5px solid ${B.neutralBorder}`,borderLeft:`3px solid ${t.color||B.textSub}`,borderRadius:10,padding:"1rem 1.25rem",marginBottom:"1rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div><p style={{fontSize:11,color:B.textSub,fontWeight:600}}>{t.label}</p><h2 style={{fontSize:16,fontWeight:600,color:B.text,margin:"4px 0 2px"}}>{permit.title}</h2><p style={{fontSize:12,color:B.textSub}}>{permit.area}</p></div>
          <span style={{background:B.accentLight,color:B.accentBorder,border:`0.5px solid ${B.accent}`,borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:600,textTransform:"capitalize",whiteSpace:"nowrap"}}>{(permit.status||"").replace("_"," ")}</span>
        </div>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:"1rem"}}>
        {["detail","audit"].map(tb=><button key={tb} onClick={()=>setTab(tb)} style={{border:`0.5px solid ${tab===tb?B.primary:B.neutralBorder}`,background:tab===tb?B.primary:"transparent",color:tab===tb?"#fff":B.textSub,borderRadius:20,padding:"5px 14px",fontSize:12,cursor:"pointer",textTransform:"capitalize"}}>{tb}</button>)}
      </div>

      {tab==="detail"&&(<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:"1rem"}}>
          {[["Team leader",permit.requester_name],["Supervisor",permit.supervisor_name],["Date",permit.created_at?new Date(permit.created_at).toLocaleDateString():"—"],["Extensions",(permit.extensions||0)+" / "+MAX_EXT]].map(([k,v])=>(
            <div key={k} style={{background:B.neutral,borderRadius:8,padding:"10px 12px"}}><p style={{fontSize:11,color:B.textSub}}>{k}</p><p style={{fontSize:13,fontWeight:600,color:B.text}}>{v}</p></div>
          ))}
        </div>
        {fd.tools_equipment&&<Card title="Tools & Equipment" collapsible><p style={{fontSize:13,color:B.text,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{fd.tools_equipment}</p></Card>}
        {fd.selected_controls?.length>0&&(<Card title="Control Measures — Requester" collapsible>{fd.selected_controls.map((c,i)=>(<div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"5px 0",borderBottom:`0.5px solid ${B.neutralBorder}`}}><span style={{color:B.accent,fontWeight:700,flexShrink:0}}>✓</span><span style={{fontSize:13,color:c==="RA Required"?B.accentBorder:B.text,fontWeight:c==="RA Required"?700:400}}>{c}</span></div>))}</Card>)}
        {fd.ra_mode&&(<Card title="Risk Assessment" accent={B.accent} collapsible>
          {fd.ra_mode==="upload"&&fd.ra_file_name&&(<div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:20}}>📄</span><div><p style={{fontSize:13,fontWeight:600,color:B.text}}>{fd.ra_file_name}</p><p style={{fontSize:11,color:B.textSub}}>Uploaded risk assessment</p></div>{fd.ra_file_data&&<a href={fd.ra_file_data} download={fd.ra_file_name} style={{marginLeft:"auto",background:B.accent,color:"#fff",borderRadius:6,padding:"5px 12px",fontSize:11,fontWeight:600,textDecoration:"none"}}>Download</a>}</div>)}
          {fd.ra_mode==="generate"&&fd.ra_generated&&(<div><p style={{fontSize:11,color:B.textSub,marginBottom:8}}>AI-Generated 5×5 Risk Assessment</p><div style={{fontSize:11,lineHeight:1.6,maxHeight:280,overflowY:"auto"}} dangerouslySetInnerHTML={{__html:fd.ra_generated}}/></div>)}
        </Card>)}
        {(permit.stage>=3||fd.osh_additional_controls)&&(<Card title="Additional Controls — OSH Manager" accent={isOSH?B.accent:undefined}>
          {isOSH?(<><p style={{fontSize:11,color:B.textSub,marginBottom:8}}>Add additional controls. Use AI for suggestions specific to this permit.</p><textarea value={oshControls} onChange={e=>setOshControls(e.target.value)} placeholder={"Additional controls (one per line)…"} rows={5} style={{resize:"vertical",marginBottom:8}}/>{session.apiKey?<button onClick={getAI} disabled={aiSuggesting} style={{width:"100%",background:aiSuggesting?"#999":B.primary,color:"#fff",border:"none",borderRadius:8,padding:"9px",fontSize:12,fontWeight:600,cursor:aiSuggesting?"not-allowed":"pointer",marginBottom:4}}>{aiSuggesting?"🤖 Getting recommendations…":"🤖 Get AI-recommended additional controls"}</button>:<p style={{fontSize:11,color:B.warn}}>⚠ AI not configured.</p>}</>):(fd.osh_additional_controls?<p style={{fontSize:13,color:B.text,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{fd.osh_additional_controls}</p>:<p style={{fontSize:12,color:B.textSub}}>No additional controls added yet.</p>)}
        </Card>)}

        {(isIssuer||permit.status==="active"||permit.status==="closed")&&checklistItems.length>0&&(<Card title="Site Verification Checklist" accent={isIssuer?B.accentBorder:undefined}>
          {isIssuer&&<p style={{fontSize:11,color:B.warn,marginBottom:8}}>Verify every control is in place on site. All items must be confirmed before issuing.</p>}
          <button onClick={()=>setShowChecklist(!showChecklist)} style={{width:"100%",background:showChecklist?B.neutral:B.primary,color:showChecklist?B.text:"#fff",border:`0.5px solid ${B.neutralBorder}`,borderRadius:8,padding:"9px",fontSize:12,fontWeight:600,cursor:"pointer",marginBottom:showChecklist?10:0}}>{showChecklist?"▲ Hide checklist":"▼ Tap to reveal site verification checklist"}</button>
          {showChecklist&&(<div>
            {checklistItems.map((c,i)=>(<label key={i} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"8px 0",borderBottom:`0.5px solid ${B.neutralBorder}`,cursor:isIssuer?"pointer":"default"}}><input type="checkbox" checked={!!checklistDone[c]} onChange={e=>isIssuer&&setChecklistDone(prev=>({...prev,[c]:e.target.checked}))} disabled={!isIssuer} style={{width:"auto",marginTop:2,accentColor:B.accent}}/><span style={{fontSize:13,color:checklistDone[c]?B.accentBorder:B.text,lineHeight:1.5}}>{c}</span></label>))}
            {fd.selected_controls?.includes("RA Required")&&fd.ra_mode&&(<div style={{background:B.accentLight,borderRadius:8,padding:"10px",marginTop:8}}><p style={{fontSize:12,fontWeight:700,color:B.accentBorder,marginBottom:6}}>Risk Assessment — on-site verification</p>{fd.ra_mode==="upload"&&fd.ra_file_data&&<a href={fd.ra_file_data} download={fd.ra_file_name} style={{display:"inline-block",background:B.accent,color:"#fff",borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:600,textDecoration:"none"}}>View / Download RA</a>}{fd.ra_mode==="generate"&&fd.ra_generated&&<div style={{fontSize:11,maxHeight:200,overflowY:"auto",marginTop:6}} dangerouslySetInnerHTML={{__html:fd.ra_generated}}/>}</div>)}
            {isIssuer&&<div style={{marginTop:8,padding:"7px 10px",background:allChecked?B.accentLight:B.warnLight,borderRadius:6}}><p style={{fontSize:11,color:allChecked?B.accentBorder:B.warn,fontWeight:600}}>{allChecked?"✓ All controls verified on site — ready to issue":"⚠ "+checklistItems.filter(c=>!checklistDone[c]).length+" item(s) remaining"}</p></div>}
          </div>)}
        </Card>)}

        {permit.status==="rejected"&&fd.rejection_reason&&(<Card title="Rejection Reason"><p style={{fontSize:13,color:B.danger,lineHeight:1.6}}>{fd.rejection_reason}</p><p style={{fontSize:11,color:B.textSub,marginTop:4}}>By {fd.rejected_by||"—"} · {fmtDate(fd.rejected_at)}</p></Card>)}

        <p style={{fontSize:12,color:B.textSub,marginBottom:8,marginTop:4}}>Approval progress</p>
        {STAGES.map((s,i)=>{const sn=i+1,done=sn===1||(sn<permit.stage)||(sn===4&&permit.status==="active"),cur=sn===permit.stage&&sn>1&&permit.status==="pending";return(<div key={s} style={{display:"flex",alignItems:"center",gap:10,background:done?B.accentLight:cur?B.warnLight:B.neutral,border:`0.5px solid ${done?B.accent:cur?B.warn:B.neutralBorder}`,borderRadius:8,padding:"8px 12px",marginBottom:6}}><div style={{width:20,height:20,borderRadius:"50%",flexShrink:0,background:done?B.accent:cur?B.warn:"#C0CAD5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",fontWeight:700}}>{done?"✓":sn}</div><div><p style={{fontSize:12,fontWeight:600,color:done?B.accentBorder:cur?B.warn:B.textSub}}>{s}</p><p style={{fontSize:10,color:done?B.accent:cur?B.warn:B.textSub}}>{done?"Approved":cur?"Awaiting approval":"Pending"}</p></div></div>);})}
      </>)}

      {tab==="audit"&&(<div><p style={{fontSize:12,color:B.textSub,marginBottom:10,fontWeight:500}}>Audit trail</p>{audit.length===0&&<p style={{fontSize:12,color:B.textSub}}>No activity yet.</p>}{audit.map((e,i)=>(<div key={e.id} style={{display:"flex",gap:10,marginBottom:10}}><div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}><div style={{width:28,height:28,borderRadius:"50%",background:B.neutral,border:`0.5px solid ${B.neutralBorder}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,color:B.text}}>{(e.user_name||"?")[0]}</div>{i<audit.length-1&&<div style={{width:1,flex:1,background:B.neutralBorder,margin:"3px 0"}}/>}</div><div style={{paddingBottom:10,flex:1}}><div style={{display:"flex",justifyContent:"space-between"}}><p style={{fontSize:12,fontWeight:600,color:B.text}}>{e.action}</p><p style={{fontSize:10,color:B.textSub}}>{fmtDate(e.created_at)}</p></div><p style={{fontSize:11,color:B.textSub}}>{e.user_name} · {e.user_role}</p>{e.note&&<p style={{fontSize:11,color:B.danger,background:B.dangerLight,borderRadius:6,padding:"4px 8px",marginTop:3}}>{e.note}</p>}</div></div>))}</div>)}

      <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:8}}>
        {showRejectBox&&(<div style={{background:B.dangerLight,border:`0.5px solid ${B.danger}`,borderRadius:8,padding:"1rem"}}><p style={{fontSize:12,fontWeight:600,color:B.danger,marginBottom:8}}>Reason for rejection *</p><textarea value={rejectReason} onChange={e=>setRejectReason(e.target.value)} placeholder="Provide clear reason…" rows={3} style={{marginBottom:8,borderColor:B.danger}}/><div style={{display:"flex",gap:8}}><button onClick={()=>action("reject")} disabled={busy||!rejectReason.trim()} style={{flex:1,background:B.danger,color:"#fff",border:"none",borderRadius:8,padding:"9px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Confirm rejection</button><button onClick={()=>{setShowRejectBox(false);setRejectReason("");}} style={{flex:1,background:"transparent",border:`0.5px solid ${B.neutralBorder}`,borderRadius:8,padding:"9px",fontSize:12,cursor:"pointer",color:B.textSub}}>Cancel</button></div></div>)}
        {permit.status==="pending"&&permit.stage!==4&&!showRejectBox&&(<div style={{display:"flex",gap:8}}><button onClick={()=>action("approve")} disabled={busy} style={{flex:1,background:busy?"#999":B.accent,color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:12,fontWeight:600,cursor:busy?"not-allowed":"pointer"}}>{busy?"Processing…":"Approve & forward"}</button><button onClick={()=>setShowRejectBox(true)} disabled={busy} style={{flex:1,border:`0.5px solid ${B.danger}`,background:B.dangerLight,color:B.danger,borderRadius:8,padding:"10px",fontSize:12,cursor:"pointer"}}>Reject</button></div>)}
        {permit.status==="pending"&&permit.stage===4&&!showRejectBox&&(<div style={{display:"flex",gap:8}}><button onClick={()=>action("issue")} disabled={busy||!allChecked} style={{flex:2,background:(busy||!allChecked)?"#999":B.accent,color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:13,fontWeight:700,cursor:(busy||!allChecked)?"not-allowed":"pointer"}}>{busy?"Processing…":allChecked?"Issue permit":"Complete checklist first"}</button><button onClick={()=>setShowRejectBox(true)} disabled={busy} style={{flex:1,border:`0.5px solid ${B.danger}`,background:B.dangerLight,color:B.danger,borderRadius:8,padding:"10px",fontSize:12,cursor:"pointer"}}>Reject</button></div>)}
        {permit.status==="active"&&(<div style={{display:"flex",gap:8}}>{canExtend&&<button onClick={()=>action("ext_request")} disabled={busy} style={{flex:1,border:`0.5px solid ${B.warn}`,background:B.warnLight,color:B.warn,borderRadius:8,padding:"10px",fontSize:12,cursor:"pointer"}}>Extend ({MAX_EXT-(permit.extensions||0)} left)</button>}<button onClick={()=>action("suspend")} disabled={busy} style={{flex:1,border:`0.5px solid ${B.danger}`,background:B.dangerLight,color:B.danger,borderRadius:8,padding:"10px",fontSize:12,cursor:"pointer"}}>Suspend</button><button onClick={()=>action("close")} disabled={busy} style={{flex:1,border:`0.5px solid ${B.accentBorder}`,background:B.accentLight,color:B.accentBorder,borderRadius:8,padding:"10px",fontSize:12,cursor:"pointer"}}>Close</button></div>)}
        {permit.status==="extension_pending"&&(<div style={{display:"flex",gap:8}}><button onClick={()=>action("ext_approve")} disabled={busy} style={{flex:1,background:B.accent,color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Approve extension</button><button onClick={()=>setShowRejectBox(true)} disabled={busy} style={{flex:1,border:`0.5px solid ${B.danger}`,background:B.dangerLight,color:B.danger,borderRadius:8,padding:"10px",fontSize:12,cursor:"pointer"}}>Reject</button></div>)}
        {(permit.status==="active"||permit.status==="closed")&&(<button onClick={()=>setShowPDF(true)} style={{width:"100%",background:B.primary,color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer"}}>📄 Generate & Download Permit PDF</button>)}
      </div>
      {showPDF&&<PermitPDF permit={permit} audit={audit} orgName={session.org.name} onClose={()=>setShowPDF(false)}/>}
    </div></div>
  );
}

// ── Permit PDF ────────────────────────────────────────────────────────────────
function PermitPDF({permit,audit,orgName,onClose}){
  const fd=permit.form_data||{};const t=pt(permit.type);
  const allControls=[...(fd.selected_controls||[]),...(fd.osh_additional_controls?fd.osh_additional_controls.split("\n").filter(s=>s.trim()):[])];
  const css=`body{font-family:Arial,sans-serif;font-size:11px;color:#1A2B3C;margin:0}
.hdr{background:#1A3A5C;color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.htit{font-size:22px;font-weight:700;letter-spacing:0.5px}.hdoc{font-size:10px;opacity:.65;margin-top:3px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600}.pwby{font-size:8px;opacity:.45;margin-top:6px;text-align:right;letter-spacing:0.04em}
.ref{font-size:13px;font-weight:700;color:#0E9E6E}.badge{display:inline-block;background:#E0F5EE;color:#0B7A55;border:0.5px solid #0E9E6E;border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700;text-transform:uppercase}
.sec{margin-bottom:12px;border:0.5px solid #D1D8E0;border-radius:6px;overflow:hidden}
.sh{background:#F4F6F9;padding:7px 12px;font-size:9px;font-weight:700;color:#5A6A7A;letter-spacing:.06em;text-transform:uppercase;border-bottom:0.5px solid #D1D8E0}
.sb{padding:10px 12px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fld{background:#F4F6F9;border-radius:4px;padding:7px 10px}.fl{font-size:9px;color:#5A6A7A;margin-bottom:2px}.fv{font-size:11px;font-weight:600}
.ctrl{display:flex;gap:8px;padding:4px 0;border-bottom:0.5px solid #F0F0F0;font-size:11px;align-items:flex-start}
.ck{color:#0E9E6E;font-weight:700;flex-shrink:0}.stg{display:flex;gap:10px;align-items:center;padding:7px 0;border-bottom:0.5px solid #F0F0F0}
.snum{width:22px;height:22px;border-radius:50%;background:#0E9E6E;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;text-align:center;line-height:22px}
.snum.p{background:#C0CAD5}.ft{text-align:center;font-size:9px;color:#aaa;border-top:0.5px solid #D1D8E0;padding-top:10px;margin-top:16px}
.conf{color:#0E9E6E;font-weight:700;letter-spacing:.08em}
table{border-collapse:collapse;width:100%;font-size:10px}th{background:#1A3A5C;color:#fff;padding:5px 8px;text-align:left}
td{padding:4px 8px;border-bottom:0.5px solid #eee}tr:nth-child(even)td{background:#f9f9f9}`;
  const html=`<style>${css}</style>
<div class="hdr"><div><div class="htit">${orgName||"Organisation"}</div><div class="hdoc">PERMIT TO WORK</div></div><div style="text-align:right"><div class="ref">${permit.permit_number}</div><div class="badge">${(permit.status||"").toUpperCase().replace("_"," ")}</div><div class="pwby">Powered by CONTROLIT</div></div></div>
<div style="margin-bottom:14px"><h2 style="font-size:16px;font-weight:700;color:#1A3A5C;margin-bottom:3px">${permit.title}</h2><p style="font-size:11px;color:#5A6A7A">${t.label||permit.type} · ${permit.area}</p></div>
<div class="sec"><div class="sh">Permit Details</div><div class="sb"><div class="g2">
<div class="fld"><div class="fl">Permit Number</div><div class="fv">${permit.permit_number}</div></div>
<div class="fld"><div class="fl">Permit Type</div><div class="fv">${t.label||permit.type}</div></div>
<div class="fld"><div class="fl">Team Leader</div><div class="fv">${permit.requester_name||"—"}</div></div>
<div class="fld"><div class="fl">Supervisor</div><div class="fv">${permit.supervisor_name||"—"}</div></div>
<div class="fld"><div class="fl">Work Area</div><div class="fv">${permit.area}</div></div>
<div class="fld"><div class="fl">Date Submitted</div><div class="fv">${permit.created_at?new Date(permit.created_at).toLocaleDateString():"—"}</div></div>
${permit.issued_at?`<div class="fld"><div class="fl">Issued</div><div class="fv">${new Date(permit.issued_at).toLocaleString()}</div></div>`:""}
${permit.closed_at?`<div class="fld"><div class="fl">Closed</div><div class="fv">${new Date(permit.closed_at).toLocaleString()}</div></div>`:""}
</div></div></div>
${fd.tools_equipment?`<div class="sec"><div class="sh">Tools & Equipment</div><div class="sb"><p style="line-height:1.7;white-space:pre-wrap">${fd.tools_equipment}</p></div></div>`:""}
${allControls.length?`<div class="sec"><div class="sh">Control Measures — All Stages</div><div class="sb">${allControls.map(c=>`<div class="ctrl"><span class="ck">✓</span><span>${c}</span></div>`).join("")}</div></div>`:""}
${fd.osh_additional_controls?`<div class="sec"><div class="sh">Additional Controls — OSH Manager</div><div class="sb"><p style="white-space:pre-wrap;line-height:1.7">${fd.osh_additional_controls}</p></div></div>`:""}
${fd.ra_mode==="generate"&&fd.ra_generated?`<div class="sec"><div class="sh">Risk Assessment (AI-Generated 5×5)</div><div class="sb" style="font-size:10px">${fd.ra_generated}</div></div>`:""}
${fd.ra_mode==="upload"&&fd.ra_file_name?`<div class="sec"><div class="sh">Risk Assessment</div><div class="sb"><p>Attached: <strong>${fd.ra_file_name}</strong></p></div></div>`:""}
<div class="sec"><div class="sh">Approval Chain</div><div class="sb">
${STAGES.map((s,i)=>{const sn=i+1,done=sn<permit.stage||(sn===4&&permit.status==="active");const ae=audit[i];return`<div class="stg"><div class="snum ${done?"":"p"}">${done?"✓":sn}</div><div><p style="font-size:11px;font-weight:600;color:${done?"#0B7A55":"#5A6A7A"}">${s}</p><p style="font-size:10px;color:#5A6A7A">${done?"Approved":"Pending"}${ae&&done?" · "+ae.user_name+" · "+new Date(ae.created_at).toLocaleString():""}</p></div></div>`;}).join("")}
</div></div>
${fd.issuer_checklist?`<div class="sec"><div class="sh">Site Verification Checklist — Issuer Confirmed</div><div class="sb">${Object.entries(fd.issuer_checklist).map(([k,v])=>`<div class="ctrl"><span class="ck" style="color:${v?"#0E9E6E":"#C0392B"}">${v?"✓":"✗"}</span><span>${k}</span></div>`).join("")}${fd.issued_by_name?`<p style="margin-top:8px;font-size:11px;color:#5A6A7A">Issued by: <strong style="color:#1A2B3C">${fd.issued_by_name}</strong></p>`:""}</div></div>`:""}
${fd.rejection_reason?`<div class="sec"><div class="sh" style="background:#FDECEA;color:#C0392B">Rejection Record</div><div class="sb"><p style="color:#C0392B">${fd.rejection_reason}</p><p style="font-size:10px;color:#5A6A7A;margin-top:4px">By ${fd.rejected_by||"—"} · ${fd.rejected_at?new Date(fd.rejected_at).toLocaleString():"—"}</p></div></div>`:""}
<div class="ft"><p class="conf">CONFIDENTIAL — ${orgName||"Organisation"}</p><p style="margin-top:3px">Permit to Work · ${permit.permit_number} · Generated: ${new Date().toLocaleString()}</p><p style="margin-top:3px;font-size:8px;color:#ccc">Managed digitally by CONTROLIT · getcontrolit.com</p></div>`;

  return(
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",flexDirection:"column"}} className="no-print">
      <div style={{background:B.primary,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <span style={{color:"#fff",fontWeight:600,fontSize:14}}>📄 {permit.permit_number}</span>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>window.print()} style={{background:B.accent,color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>🖨 Print / Save as PDF</button>
          <button onClick={onClose} style={{background:"transparent",border:"0.5px solid rgba(255,255,255,0.3)",color:"#fff",borderRadius:8,padding:"8px 14px",fontSize:12,cursor:"pointer"}}>✕ Close</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",background:"#fff",padding:"20px"}}><div dangerouslySetInnerHTML={{__html:html}}/></div>
    </div>
  );
}

// ── Notifications ─────────────────────────────────────────────────────────────
function Notifs({session,onBack,onSelectPermit,onUnreadChange}){
  const[notes,setNotes]=useState([]);const[loading,setLoading]=useState(true);
  async function load(){setLoading(true);const d=await sb.select(session.token,"notifications",`user_id=eq.${session.userId}&order=created_at.desc&limit=80`);if(Array.isArray(d)){setNotes(d);if(onUnreadChange)onUnreadChange(d.filter(n=>!n.is_read).length);}setLoading(false);}
  useEffect(()=>{load();},[]);
  async function markAll(){await sb.update(session.token,"notifications",`user_id=eq.${session.userId}&is_read=eq.false`,{is_read:true});setNotes(p=>p.map(n=>({...n,is_read:true})));if(onUnreadChange)onUnreadChange(0);}
  async function readNote(n){if(!n.is_read){await sb.update(session.token,"notifications",`id=eq.${n.id}`,{is_read:true});setNotes(p=>p.map(x=>x.id===n.id?{...x,is_read:true}:x));if(onUnreadChange)onUnreadChange(notes.filter(x=>!x.is_read&&x.id!==n.id).length);}if(n.permit_id){const ps=await sb.select(session.token,"permits",`id=eq.${n.permit_id}`);if(Array.isArray(ps)&&ps[0])onSelectPermit(ps[0]);}}
  const icons={submitted:"📋",aa_approved:"✓",osh_approved:"✓",issued:"🟢",rejected:"✗",suspended:"⚠",closed:"🔒",ext_requested:"⟳",ext_approved:"✓",ext_rejected:"✗"};
  const unread=notes.filter(n=>!n.is_read).length;
  return(<div><Topbar title="Notifications" onBack={onBack} right={unread>0?<button onClick={markAll} style={{border:"0.5px solid rgba(255,255,255,0.3)",background:"rgba(255,255,255,0.1)",color:"#fff",borderRadius:6,padding:"6px 12px",fontSize:11,cursor:"pointer"}}>Mark all read</button>:null}/>
  <div style={{padding:"1.25rem"}}>
    {loading&&<Spinner/>}
    {!loading&&notes.length===0&&<div style={{textAlign:"center",padding:"3rem 1rem"}}><p style={{fontSize:32}}>✓</p><p style={{fontSize:14,fontWeight:600,color:B.text,marginTop:8}}>All clear</p><p style={{fontSize:13,color:B.textSub}}>No notifications yet.</p></div>}
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {notes.map(n=>{const isRead=n.is_read,icon=icons[n.event_type]||"🔔";return(
        <div key={n.id} onClick={()=>readNote(n)} style={{background:isRead?"#fff":B.accentLight,border:`0.5px solid ${isRead?B.neutralBorder:B.accent}`,borderLeft:`3px solid ${isRead?B.neutralBorder:B.accent}`,borderRadius:10,padding:"12px 14px",cursor:"pointer",opacity:isRead?0.7:1}}>
          <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:B.neutral,border:`0.5px solid ${B.neutralBorder}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{icon}</div>
            <div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",gap:8}}><p style={{fontSize:12,fontWeight:isRead?500:700,color:isRead?B.textSub:B.text,flex:1}}>{n.message}</p><p style={{fontSize:10,color:B.textSub,whiteSpace:"nowrap"}}>{n.created_at?new Date(n.created_at).toLocaleString():""}</p></div><p style={{fontSize:11,color:B.accentBorder,marginTop:2}}>{n.reference}{n.title?" · "+n.title:""}</p>{!isRead&&<span style={{fontSize:10,background:B.accent,color:"#fff",borderRadius:20,padding:"1px 8px",marginTop:4,display:"inline-block"}}>New</span>}</div>
          </div>
        </div>
      );})}
    </div>
  </div></div>);
}

// ── Admin ─────────────────────────────────────────────────────────────────────
function Admin({session,onBack}){
  const[users,setUsers]=useState([]);const[loading,setLoading]=useState(true);const[showForm,setShowForm]=useState(false);const[nm,setNm]=useState("");const[em,setEm]=useState("");const[rl,setRl]=useState("requester");const[pw,setPw]=useState("Controlit@2024!");const[busy,setBusy]=useState(false);const[result,setResult]=useState(null);const[err,setErr]=useState("");
  function load(){setLoading(true);sb.select(session.token,"profiles","org_id=eq."+session.profile.org_id+"&order=full_name.asc").then(d=>{if(Array.isArray(d))setUsers(d);setLoading(false);});}
  useEffect(()=>{load();},[]);
  async function invite(){if(!nm||!em){setErr("Name and email required.");return;}setBusy(true);setErr("");setResult(null);try{const au=await sb.createUser(em,pw);if(!au||!au.id){setErr("Failed: "+(au&&au.message?au.message:"Unknown"));setBusy(false);return;}await sb.insert(session.token,"profiles",{id:au.id,org_id:session.profile.org_id,full_name:nm,email:em,role:rl,active:true});setResult({name:nm,email:em,pass:pw,role:rl});setNm("");setEm("");setPw("Controlit@2024!");setRl("requester");load();}catch(e){setErr("Error: "+e.message);}setBusy(false);}
  async function updRole(uid,r){await sb.update(session.token,"profiles",`id=eq.${uid}`,{role:r});setUsers(p=>p.map(u=>u.id===uid?{...u,role:r}:u));}
  async function toggle(u){const n=!u.active;await sb.update(session.token,"profiles",`id=eq.${u.id}`,{active:n});setUsers(p=>p.map(x=>x.id===u.id?{...x,active:n}:x));}
  return(<div><Topbar title="Admin Panel" onBack={onBack}/><div style={{padding:"1.25rem"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}><p style={{fontSize:13,fontWeight:600,color:B.text}}>Team ({users.length})</p><button onClick={()=>{setShowForm(!showForm);setResult(null);setErr("");}} style={{background:B.accent,color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{showForm?"Cancel":"+ Invite member"}</button></div>
    {showForm&&(<div style={{background:B.neutral,border:`0.5px solid ${B.neutralBorder}`,borderRadius:12,padding:"1rem 1.25rem",marginBottom:"1rem"}}><p style={{fontSize:13,fontWeight:600,color:B.text,marginBottom:"1rem"}}>New team member</p>{err&&<ErrBox msg={err}/>}
      {result&&(<div style={{background:B.accentLight,border:`0.5px solid ${B.accent}`,borderRadius:10,padding:"1rem",marginBottom:"1rem"}}><p style={{fontSize:12,fontWeight:700,color:B.accentBorder,marginBottom:8}}>✓ {result.name} added</p><div style={{background:"#fff",borderRadius:8,padding:"10px 12px",fontSize:12,fontFamily:"monospace",color:B.text,lineHeight:2}}><div>URL: https://getcontrolit.com/app.html</div><div>Email: {result.email}</div><div>Password: {result.pass}</div><div>Role: {roleLabel(result.role)}</div></div><button onClick={()=>setResult(null)} style={{marginTop:10,background:"transparent",border:`0.5px solid ${B.neutralBorder}`,borderRadius:6,padding:"6px 12px",fontSize:12,cursor:"pointer",color:B.textSub}}>Invite another</button></div>)}
      {!result&&(<><div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:12}}><div><label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Full name *</label><input value={nm} onChange={e=>setNm(e.target.value)} placeholder="e.g. John Adeyemi"/></div><div><label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Email *</label><input value={em} onChange={e=>setEm(e.target.value)} type="email"/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div><label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Role *</label><select value={rl} onChange={e=>setRl(e.target.value)}>{ROLES.map(r=><option key={r} value={r}>{roleLabel(r)}</option>)}</select></div><div><label style={{fontSize:12,color:B.textSub,display:"block",marginBottom:4}}>Temp password</label><input value={pw} onChange={e=>setPw(e.target.value)}/></div></div></div><button onClick={invite} disabled={busy} style={{width:"100%",background:busy?"#999":B.accent,color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:600,cursor:busy?"not-allowed":"pointer"}}>{busy?"Creating…":"Create account & invite"}</button></>)}
    </div>)}
    {loading&&<Spinner/>}
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {!loading&&users.length===0&&<p style={{fontSize:13,color:B.textSub}}>No team members yet.</p>}
      {users.map(u=>(<div key={u.id} style={{background:"#fff",border:`0.5px solid ${B.neutralBorder}`,borderRadius:10,padding:"12px 14px",opacity:u.active?1:0.6}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:u.id!==session.userId?10:0}}><div style={{display:"flex",gap:10,alignItems:"center"}}><div style={{width:36,height:36,borderRadius:"50%",background:B.accentLight,border:`0.5px solid ${B.accent}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:B.accentBorder,flexShrink:0}}>{u.full_name.split(" ").map(n=>n[0]).join("").slice(0,2)}</div><div><p style={{fontSize:13,fontWeight:600,color:B.text}}>{u.full_name}</p><p style={{fontSize:11,color:B.textSub}}>{u.email}</p><p style={{fontSize:11,color:B.textSub,textTransform:"capitalize"}}>{roleLabel(u.role)}</p></div></div><span style={{background:u.active?B.accentLight:B.neutral,color:u.active?B.accentBorder:B.textSub,border:`0.5px solid ${u.active?B.accent:B.neutralBorder}`,borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:600}}>{u.active?"Active":"Suspended"}</span></div>{u.id!==session.userId&&(<div style={{display:"flex",gap:8,alignItems:"center",paddingTop:8,borderTop:`0.5px solid ${B.neutralBorder}`}}><select value={u.role} onChange={e=>updRole(u.id,e.target.value)} style={{fontSize:11,padding:"4px 8px",flex:1,borderRadius:6,height:30}}>{ROLES.map(r=><option key={r} value={r}>{roleLabel(r)}</option>)}</select><button onClick={()=>toggle(u)} style={{background:u.active?B.warnLight:B.accentLight,color:u.active?B.warn:B.accentBorder,border:`0.5px solid ${u.active?B.warn:B.accent}`,borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>{u.active?"Suspend":"Reactivate"}</button></div>)}{u.id===session.userId&&<p style={{fontSize:11,color:B.textSub,marginTop:4}}>This is your account</p>}</div>))}
    </div>
  </div></div>);
}

// ── App Root ──────────────────────────────────────────────────────────────────
function App(){
  const[session,setSession]=useState(null);const[screen,setScreen]=useState("dashboard");const[permits,setPermits]=useState([]);const[selected,setSelected]=useState(null);const[loading,setLoading]=useState(false);const[error,setError]=useState("");const[setupDone,setSetupDone]=useState(false);const[unread,setUnread]=useState(0);
  const fetchPermits=useCallback(async()=>{if(!session)return;setLoading(true);setError("");try{const d=await sb.select(session.token,"permits","order=created_at.desc");if(Array.isArray(d))setPermits(d);else setError("Failed to load permits.");}catch(e){setError("Connection error.");}setLoading(false);},[session]);
  const fetchUnread=useCallback(async()=>{if(!session)return;try{const d=await sb.select(session.token,"notifications",`user_id=eq.${session.userId}&is_read=eq.false&select=id`);if(Array.isArray(d))setUnread(d.length);}catch(e){}},[session]);
  useEffect(()=>{fetchPermits();},[fetchPermits]);useEffect(()=>{fetchUnread();},[fetchUnread]);
  if(!session)return <Login onLogin={s=>setSession(s)}/>;
  if(session.firstTime&&!setupDone)return <AccountSetup session={session} onComplete={s=>{setSession(s);setSetupDone(true);}}/>;
  async function logout(){await sb.signOut(session.token);setSession(null);setPermits([]);setScreen("dashboard");setSetupDone(false);}
  function sel(p){setSelected(p);setScreen("detail");}
  return(<div>
    {screen==="dashboard"&&<Dashboard session={session} permits={permits} loading={loading} error={error} onSelect={sel} onNew={()=>setScreen("new")} onNotifs={()=>setScreen("notifs")} unread={unread} onAdmin={()=>setScreen("admin")} onWorkflow={()=>setScreen("workflow")} onChangePass={()=>setScreen("changepass")} onLogout={logout}/>}
    {screen==="detail"&&selected&&<PermitDetail permit={selected} session={session} onBack={()=>{fetchPermits();fetchUnread();setScreen("dashboard");}} onRefresh={async()=>{await fetchPermits();await fetchUnread();}}/>}
    {screen==="new"&&<NewPermit session={session} onBack={()=>setScreen("dashboard")} onSuccess={()=>{fetchPermits();fetchUnread();setScreen("dashboard");}}/>}
    {screen==="notifs"&&<Notifs session={session} onBack={()=>{fetchUnread();setScreen("dashboard");}} onSelectPermit={p=>{setSelected(p);setScreen("detail");}} onUnreadChange={setUnread}/>}
    {screen==="admin"&&<Admin session={session} onBack={()=>setScreen("dashboard")}/>}
    {screen==="changepass"&&<ChangePassword session={session} onBack={()=>setScreen("dashboard")}/>}
    {screen==="workflow"&&(<div><Topbar title="Permit Workflow" onBack={()=>setScreen("dashboard")}/><div style={{padding:"1.25rem"}}>{STAGES.map((s,i)=>(<div key={s} style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:16}}><div style={{width:32,height:32,borderRadius:"50%",background:B.primary,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,flexShrink:0}}>{i+1}</div><div style={{background:B.neutral,borderRadius:8,padding:"10px 14px",flex:1}}><p style={{fontSize:13,fontWeight:600,color:B.text}}>{s}</p><p style={{fontSize:11,color:B.textSub,marginTop:2}}>{["Submits permit with control measures, tools & equipment, and risk assessment (upload or AI-generated 5x5 matrix)","Reviews all requester inputs — confirms area readiness, approves or rejects with reason","Reviews HSE compliance, adds additional controls with AI assist, approves or rejects — checklist auto-generated","Verifies all controls on site via checklist, issues permit — formal PTW document generated for download"][i]}</p></div></div>))}</div></div>)}
  </div>);
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
